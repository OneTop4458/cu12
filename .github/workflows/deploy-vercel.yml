name: Deploy Vercel

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"
      - "apps/worker/**"
      - "packages/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vercel-main
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --prefer-offline --no-audit
      - run: npm run check:text
      - run: npm run check:openapi
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build:web

  db-sync:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --prefer-offline --no-audit
      - name: Push Prisma schema (non-destructive by default)
        run: npm run prisma:push

  deploy:
    needs: db-sync
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --prefer-offline --no-audit
      - run: npm i -g vercel@latest
      - name: Validate Vercel token
        shell: bash
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN is missing. Set repository secret VERCEL_TOKEN."
            exit 1
          fi

          if ! vercel whoami --token="$VERCEL_TOKEN" >/dev/null 2>&1; then
            echo "::error::VERCEL_TOKEN is invalid or expired."
            exit 1
          fi

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
      - name: Build production bundle
        run: vercel build --prod --token=$VERCEL_TOKEN
      - name: Deploy production bundle
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
