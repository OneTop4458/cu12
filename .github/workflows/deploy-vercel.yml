name: Deploy Vercel

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"
      - "apps/worker/**"
      - "packages/**"
      - "prisma/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".npmrc"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vercel-main
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b
        with:
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:text
      - run: pnpm run check:openapi
      - run: pnpm run prisma:generate
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test:all
      - run: pnpm run build:web

  db-sync:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b
        with:
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate
      - name: Ensure auth/policy unique constraints are safe to apply
        run: node scripts/db-ensure-auth-policy-constraints.mjs
      - name: Push Prisma schema (non-destructive by default)
        run: pnpm exec prisma db push --schema prisma/schema.prisma
      - name: Backfill auth/policy columns after schema sync
        run: node scripts/db-backfill-auth-policy-columns.mjs

  deploy:
    needs: db-sync
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b
        with:
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate
      - name: Validate Vercel token
        shell: bash
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN is missing. Set repository secret VERCEL_TOKEN."
            exit 1
          fi

          if ! pnpm dlx vercel@latest whoami --token="$VERCEL_TOKEN" >/dev/null 2>&1; then
            echo "::error::VERCEL_TOKEN is invalid or expired."
            exit 1
          fi

      - name: Pull Vercel project settings
        run: pnpm dlx vercel@latest pull --yes --environment=production --token=$VERCEL_TOKEN
      - name: Build production bundle
        run: pnpm dlx vercel@latest build --prod --token=$VERCEL_TOKEN
      - name: Deploy production bundle
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token=$VERCEL_TOKEN
