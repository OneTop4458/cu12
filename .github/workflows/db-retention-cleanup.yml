name: DB Retention Cleanup

on:
  schedule:
    - cron: "10 1 * * *"
  workflow_dispatch:
    inputs:
      cleanupMode:
        description: "global_bogus_notices | user_repair"
        required: false
        default: "global_bogus_notices"
        type: string
      userId:
        description: "Target user id for focused cleanup"
        required: false
        type: string

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CLEANUP_MODE: ${{ inputs.cleanupMode }}
      TARGET_USER_ID: ${{ inputs.userId }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b
        with:
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate
      - name: Cleanup legacy notices and notifications
        run: |
          node <<'NODE'
          const { PrismaClient } = require("@prisma/client");

          async function main() {
            const mode = (process.env.CLEANUP_MODE || "global_bogus_notices").trim();
            const userId = (process.env.TARGET_USER_ID || "").trim();
            if (!["global_bogus_notices", "user_repair"].includes(mode)) {
              throw new Error(`Unsupported CLEANUP_MODE: ${mode}`);
            }
            if (mode === "user_repair" && !userId) {
              throw new Error("TARGET_USER_ID is required for user_repair mode.");
            }

            const prisma = new PrismaClient();
            const bogusNoticeTitle = /^\uC870\uD68C\uD558\uC9C0 \uC54A\uC740 \uACF5\uC9C0\uC0AC\uD56D \uC218\d+$/;

            const bogusNotices = await prisma.courseNotice.findMany({
              where: mode === "user_repair" ? { userId } : {},
              select: { id: true, title: true },
            });

            const bogusNoticeIds = bogusNotices
              .filter((notice) => bogusNoticeTitle.test(notice.title))
              .map((notice) => notice.id);

            const deletedNotices = bogusNoticeIds.length > 0
              ? await prisma.courseNotice.deleteMany({
                  where: {
                    ...(mode === "user_repair" ? { userId } : {}),
                    id: { in: bogusNoticeIds },
                  },
                })
              : { count: 0 };

            const deletedNotifications = mode === "user_repair"
              ? await prisma.notificationEvent.deleteMany({
                  where: { userId },
                })
              : { count: 0 };

            await prisma.$disconnect();

            console.log(`cleanupMode=${mode}`);
            console.log(`targetUserId=${userId || "ALL_USERS"}`);
            console.log(`deletedBogusNotices=${deletedNotices.count}`);
            console.log(`deletedNotifications=${deletedNotifications.count}`);
          }

          main().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE
