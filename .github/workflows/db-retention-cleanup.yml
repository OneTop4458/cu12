name: DB Retention Cleanup

on:
  schedule:
    - cron: "10 1 * * *"
  workflow_dispatch:
    inputs:
      userId:
        description: "Target user id for focused cleanup"
        required: true
        type: string

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TARGET_USER_ID: ${{ inputs.userId }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate
      - name: Cleanup legacy notices and notifications for one user
        run: |
          node <<'NODE'
          const { PrismaClient } = require("@prisma/client");

          async function main() {
            const userId = (process.env.TARGET_USER_ID || "").trim();
            if (!userId) {
              throw new Error("TARGET_USER_ID is required.");
            }

            const prisma = new PrismaClient();

            const bogusNoticeTitle = /^조회하지 않은 공지사항 수\d+$/;

            const bogusNotices = await prisma.courseNotice.findMany({
              where: { userId },
              select: { id: true, title: true },
            });

            const bogusNoticeIds = bogusNotices
              .filter((notice) => bogusNoticeTitle.test(notice.title))
              .map((notice) => notice.id);

            const deletedNotices = bogusNoticeIds.length > 0
              ? await prisma.courseNotice.deleteMany({
                  where: {
                    userId,
                    id: { in: bogusNoticeIds },
                  },
                })
              : { count: 0 };

            const deletedNotifications = await prisma.notificationEvent.deleteMany({
              where: { userId },
            });

            await prisma.$disconnect();

            console.log(`targetUserId=${userId}`);
            console.log(`deletedBogusNotices=${deletedNotices.count}`);
            console.log(`deletedNotifications=${deletedNotifications.count}`);
          }

          main().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE
