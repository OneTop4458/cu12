name: Manual DB Push

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  push-schema:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate
      - name: Ensure auth/policy unique constraints are safe to apply
        run: node scripts/db-ensure-auth-policy-constraints.mjs
      - name: Drop legacy invite token table
        env:
          ALLOW_DROP_INVITE_TOKEN: "true"
        run: node scripts/db-drop-invite-token.mjs
      - name: Push Prisma schema directly
        run: pnpm exec prisma db push --schema prisma/schema.prisma
      - name: Backfill auth/policy columns after schema sync
        run: node scripts/db-backfill-auth-policy-columns.mjs
