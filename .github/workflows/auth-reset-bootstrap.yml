name: Auth Reset Bootstrap

on:
  workflow_dispatch:
    inputs:
      confirmReset:
        description: "Type RESET_CU12_AUTH to confirm destructive reset"
        required: true
        type: string
      adminCu12Id:
        description: "Admin CU12 ID to receive new invite token"
        required: true
        type: string
      inviteCodeHash:
        description: "SHA-256 hash of the admin invite code (64 lowercase hex chars)"
        required: true
        type: string
      expiresHours:
        description: "Admin invite expiration in hours (1-720)"
        required: false
        default: "72"
        type: string

permissions:
  contents: read

jobs:
  reset-and-bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CONFIRM_RESET: ${{ inputs.confirmReset }}
      ADMIN_CU12_ID: ${{ inputs.adminCu12Id }}
      INVITE_CODE_HASH: ${{ inputs.inviteCodeHash }}
      EXPIRES_HOURS: ${{ inputs.expiresHours }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - name: Reset auth data and issue ADMIN invite token
        run: |
          node <<'NODE'
          const { PrismaClient, UserRole } = require("@prisma/client");

          async function main() {
            if (process.env.CONFIRM_RESET !== "RESET_CU12_AUTH") {
              throw new Error("Confirmation text mismatch.");
            }

            const cu12Id = (process.env.ADMIN_CU12_ID || "").trim();
            const inviteCodeHash = (process.env.INVITE_CODE_HASH || "").trim().toLowerCase();
            const expiresHoursRaw = Number(process.env.EXPIRES_HOURS || "72");
            const expiresHours = Number.isFinite(expiresHoursRaw) ? expiresHoursRaw : 72;
            if (!cu12Id || cu12Id.length < 4) {
              throw new Error("Invalid adminCu12Id");
            }
            if (!/^[a-f0-9]{64}$/.test(inviteCodeHash)) {
              throw new Error("inviteCodeHash must be a 64-char lowercase SHA-256 hex string");
            }
            if (expiresHours < 1 || expiresHours > 720) {
              throw new Error("expiresHours out of range");
            }

            const prisma = new PrismaClient();

            await prisma.$executeRawUnsafe(`
              TRUNCATE TABLE
                "MailDelivery",
                "MailSubscription",
                "LearningRun",
                "LearningTask",
                "NotificationEvent",
                "CourseNotice",
                "CourseSnapshot",
                "JobQueue",
                "WorkerHeartbeat",
                "Cu12Account",
                "InviteToken",
                "User"
              RESTART IDENTITY CASCADE;
            `);

            const invite = await prisma.inviteToken.create({
              data: {
                cu12Id,
                role: UserRole.ADMIN,
                tokenHash: inviteCodeHash,
                expiresAt: new Date(Date.now() + expiresHours * 60 * 60 * 1000),
              },
            });

            await prisma.$disconnect();

            console.log("Auth data reset complete.");
            console.log("adminCu12Id=" + cu12Id);
            console.log("inviteId=" + invite.id);
            console.log("expiresAt=" + invite.expiresAt.toISOString());
          }

          main().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE
