name: Auth Reset Bootstrap

on:
  workflow_dispatch:
    inputs:
      confirmReset:
        description: "Type RESET_CU12_AUTH to confirm destructive reset"
        required: true
        type: string
      adminCu12Id:
        description: "Admin CU12 ID to pre-approve after reset"
        required: true
        type: string

permissions:
  contents: read

jobs:
  reset-and-bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CONFIRM_RESET: ${{ inputs.confirmReset }}
      ADMIN_CU12_ID: ${{ inputs.adminCu12Id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b
        with:
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate
      - name: Reset auth data and pre-approve ADMIN account
        run: |
          node <<'NODE'
          const crypto = require("node:crypto");
          const { PrismaClient } = require("@prisma/client");

          async function main() {
            if (process.env.CONFIRM_RESET !== "RESET_CU12_AUTH") {
              throw new Error("Confirmation text mismatch.");
            }

            const cu12Id = (process.env.ADMIN_CU12_ID || "").trim();
            if (!cu12Id || cu12Id.length < 4) {
              throw new Error("Invalid adminCu12Id");
            }

            const prisma = new PrismaClient();
            await prisma.$executeRawUnsafe(`DROP TABLE IF EXISTS "InviteToken" CASCADE;`);
            await prisma.$executeRawUnsafe(`
              TRUNCATE TABLE
                "MailDelivery",
                "MailSubscription",
                "LearningRun",
                "LearningTask",
                "NotificationEvent",
                "CourseNotice",
                "CourseSnapshot",
                "JobQueue",
                "WorkerHeartbeat",
                "Cu12Account",
                "User"
              RESTART IDENTITY CASCADE;
            `);

            const now = new Date();
            const passwordHash = "portal-approved-placeholder:" + crypto.randomUUID();
            const user = await prisma.user.create({
              data: {
                email: cu12Id,
                name: cu12Id,
                passwordHash,
                role: "ADMIN",
                isActive: true,
                isTestUser: false,
                approvalStatus: "APPROVED",
                approvalRequestedAt: null,
                approvalDecidedAt: now,
                approvalDecidedByUserId: null,
                approvalRejectedReason: null,
              },
              select: {
                id: true,
                email: true,
                role: true,
                approvalStatus: true,
              },
            });

            await prisma.$disconnect();

            console.log("Auth data reset complete.");
            console.log("adminCu12Id=" + user.email);
            console.log("adminUserId=" + user.id);
            console.log("approvalStatus=" + user.approvalStatus);
          }

          main().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE
