name: AutoLearn Dispatch

on:
  schedule:
    - cron: "20 */2 * * *"
  workflow_dispatch:
    inputs:
      userId:
        description: "Optional user id"
        required: false
        type: string

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      created_count: ${{ steps.dispatch.outputs.created_count }}
      existing_count: ${{ steps.dispatch.outputs.existing_count }}
      pending_count: ${{ steps.dispatch.outputs.pending_count }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - id: dispatch
        name: Dispatch autolearn jobs
        run: |
          SUMMARY_JSON_WORKER="dispatch-summary.json"
          SUMMARY_JSON_ROOT="apps/worker/dispatch-summary.json"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            npm --workspace @cu12/worker run dispatch:autolearn -- --min-interval-minutes=120 --eligible-window-only=true --summary-json="$SUMMARY_JSON_WORKER"
          elif [ -n "${{ inputs.userId }}" ]; then
            npm --workspace @cu12/worker run dispatch:autolearn -- --userId=${{ inputs.userId }} --summary-json="$SUMMARY_JSON_WORKER"
          else
            npm --workspace @cu12/worker run dispatch:autolearn -- --summary-json="$SUMMARY_JSON_WORKER"
          fi
          CREATED_COUNT=$(node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(String(data.createdCount ?? 0));" "$SUMMARY_JSON_ROOT")
          EXISTING_COUNT=$(node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(String(data.skippedExistingCount ?? 0));" "$SUMMARY_JSON_ROOT")
          PENDING_COUNT=$(node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(String(data.skippedExistingPendingCount ?? 0));" "$SUMMARY_JSON_ROOT")
          echo "created_count=$CREATED_COUNT" >> "$GITHUB_OUTPUT"
          echo "existing_count=$EXISTING_COUNT" >> "$GITHUB_OUTPUT"
          echo "pending_count=$PENDING_COUNT" >> "$GITHUB_OUTPUT"

  consume:
    needs: dispatch
    if: ${{ needs.dispatch.outputs.created_count != '0' || needs.dispatch.outputs.pending_count != '0' }}
    uses: ./.github/workflows/worker-consume.yml
    with:
      trigger: autolearn
      jobTypes: AUTOLEARN
    secrets: inherit
