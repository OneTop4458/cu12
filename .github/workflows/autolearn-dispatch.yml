name: AutoLearn Dispatch

on:
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:
    inputs:
      userId:
        description: "Optional user id"
        required: false
        type: string

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      APP_MASTER_KEY: ${{ secrets.APP_MASTER_KEY }}
      WEB_INTERNAL_BASE_URL: ${{ secrets.WEB_INTERNAL_BASE_URL }}
      WORKER_SHARED_TOKEN: ${{ secrets.WORKER_SHARED_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate
      - id: dispatch
        name: Dispatch autolearn jobs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_USER_ID: ${{ inputs.userId }}
        run: |
          SUMMARY_JSON_WORKER="dispatch-summary.json"
          SUMMARY_JSON_ROOT="apps/worker/dispatch-summary.json"

          DISPATCH_ARGS=("--summary-json=$SUMMARY_JSON_WORKER")
          if [ "$EVENT_NAME" = "schedule" ]; then
            DISPATCH_ARGS=("--min-interval-minutes=1440" "--eligible-window-only=true" "--summary-json=$SUMMARY_JSON_WORKER")
          elif [ -n "$INPUT_USER_ID" ]; then
            DISPATCH_ARGS=("--userId=$INPUT_USER_ID" "--summary-json=$SUMMARY_JSON_WORKER")
          fi
          pnpm --filter @cu12/worker run dispatch:autolearn -- "${DISPATCH_ARGS[@]}"

          CREATED_COUNT=$(node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(String(data.createdCount ?? 0));" "$SUMMARY_JSON_ROOT")
          EXISTING_COUNT=$(node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(String(data.skippedExistingCount ?? 0));" "$SUMMARY_JSON_ROOT")
          PENDING_COUNT=$(node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(String(data.skippedExistingPendingCount ?? 0));" "$SUMMARY_JSON_ROOT")
          SHOULD_DISPATCH=false
          if [ "$CREATED_COUNT" != "0" ] || [ "$PENDING_COUNT" != "0" ]; then
            SHOULD_DISPATCH=true
          elif [ -z "$INPUT_USER_ID" ]; then
            SHOULD_DISPATCH=true
          fi
          if [ "$SHOULD_DISPATCH" = "true" ]; then
            TARGET_URL="${WEB_INTERNAL_BASE_URL%/}/internal/worker/dispatch"
            if [ -n "$INPUT_USER_ID" ]; then
              PAYLOAD=$(node -e "process.stdout.write(JSON.stringify({ trigger: 'autolearn', userId: process.argv[1] }));" "$INPUT_USER_ID")
            else
              PAYLOAD='{"trigger":"autolearn"}'
            fi
            RESPONSE=$(curl -fsS -X POST "$TARGET_URL" \
              -H "content-type: application/json" \
              -H "x-worker-token: $WORKER_SHARED_TOKEN" \
              -d "$PAYLOAD")
            echo "dispatch_response=$RESPONSE"
            STATE=$(node -e "const data=JSON.parse(process.argv[1]); process.stdout.write(String(data.state ?? ''));" "$RESPONSE")
            if [ "$STATE" = "FAILED" ]; then
              echo "worker dispatch failed" >&2
              exit 1
            fi
          fi
