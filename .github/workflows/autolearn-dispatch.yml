name: AutoLearn Dispatch

on:
  workflow_dispatch:
    inputs:
      userId:
        description: "Optional user id"
        required: false
        type: string

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    outputs:
      created_count: ${{ steps.dispatch.outputs.created_count }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - id: dispatch
        name: Dispatch autolearn jobs
        run: |
          SUMMARY_JSON="apps/worker/dispatch-summary.json"
          if [ -n "${{ inputs.userId }}" ]; then
            npm --workspace @cu12/worker run dispatch:autolearn -- --userId=${{ inputs.userId }} --summary-json="$SUMMARY_JSON"
          else
            npm --workspace @cu12/worker run dispatch:autolearn -- --summary-json="$SUMMARY_JSON"
          fi
          CREATED_COUNT=$(node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(String(data.createdCount ?? 0));" "$SUMMARY_JSON")
          echo "created_count=$CREATED_COUNT" >> "$GITHUB_OUTPUT"

  consume:
    needs: dispatch
    if: ${{ needs.dispatch.outputs.created_count != '0' }}
    uses: ./.github/workflows/worker-consume.yml
    with:
      trigger: autolearn
      jobTypes: AUTOLEARN
    secrets: inherit
