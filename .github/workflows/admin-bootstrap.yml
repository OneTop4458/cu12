name: Admin Bootstrap

on:
  workflow_dispatch:
    inputs:
      adminEmail:
        description: "Admin email"
        required: true
        type: string
      adminName:
        description: "Admin display name"
        required: true
        type: string
      adminPassword:
        description: "Admin password (min 8)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ADMIN_EMAIL: ${{ inputs.adminEmail }}
      ADMIN_NAME: ${{ inputs.adminName }}
      ADMIN_PASSWORD: ${{ inputs.adminPassword }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - name: Upsert admin user
        run: |
          node <<'NODE'
          const { PrismaClient, UserRole } = require("@prisma/client");
          const bcrypt = require("bcryptjs");

          async function main() {
            const prisma = new PrismaClient();
            const email = process.env.ADMIN_EMAIL;
            const name = process.env.ADMIN_NAME;
            const password = process.env.ADMIN_PASSWORD;
            if (!email || !name || !password || password.length < 8) {
              throw new Error("Invalid admin bootstrap input");
            }

            const passwordHash = await bcrypt.hash(password, 12);
            const user = await prisma.user.upsert({
              where: { email },
              create: {
                email,
                name,
                passwordHash,
                role: UserRole.ADMIN,
              },
              update: {
                name,
                passwordHash,
                role: UserRole.ADMIN,
              },
            });

            await prisma.$disconnect();
            console.log("Admin bootstrap success for userId=" + user.id);
          }

          main().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE
