name: Admin Bootstrap

on:
  workflow_dispatch:
    inputs:
      adminCu12Id:
        description: "Admin CU12 ID to pre-approve"
        required: true
        type: string

permissions:
  contents: read

jobs:
  approve-admin:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ADMIN_CU12_ID: ${{ inputs.adminCu12Id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate
      - name: Pre-approve ADMIN account
        run: |
          node <<'NODE'
          const crypto = require("node:crypto");
          const { PrismaClient } = require("@prisma/client");

          async function main() {
            const prisma = new PrismaClient();
            const cu12Id = (process.env.ADMIN_CU12_ID || "").trim();

            if (!cu12Id || cu12Id.length < 4) {
              throw new Error("Invalid adminCu12Id");
            }

            const now = new Date();
            const passwordHash = "portal-approved-placeholder:" + crypto.randomUUID();
            const user = await prisma.user.upsert({
              where: { email: cu12Id },
              create: {
                email: cu12Id,
                name: cu12Id,
                passwordHash,
                role: "ADMIN",
                isActive: true,
                isTestUser: false,
                approvalStatus: "APPROVED",
                approvalRequestedAt: null,
                approvalDecidedAt: now,
                approvalDecidedByUserId: null,
                approvalRejectedReason: null,
              },
              update: {
                role: "ADMIN",
                isActive: true,
                isTestUser: false,
                approvalStatus: "APPROVED",
                approvalRequestedAt: null,
                approvalDecidedAt: now,
                approvalDecidedByUserId: null,
                approvalRejectedReason: null,
              },
              select: {
                id: true,
                email: true,
                role: true,
                approvalStatus: true,
              },
            });

            await prisma.$disconnect();

            console.log("Admin account pre-approved:");
            console.log("userId=" + user.id);
            console.log("cu12Id=" + user.email);
            console.log("role=" + user.role);
            console.log("approvalStatus=" + user.approvalStatus);
          }

          main().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE
