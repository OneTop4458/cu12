name: Admin Bootstrap

on:
  workflow_dispatch:
    inputs:
      adminCu12Id:
        description: "Admin CU12 ID"
        required: true
        type: string
      expiresHours:
        description: "Invite expiration in hours (1-720)"
        required: false
        default: "72"
        type: string

permissions:
  contents: read

jobs:
  issue-admin-invite:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ADMIN_CU12_ID: ${{ inputs.adminCu12Id }}
      EXPIRES_HOURS: ${{ inputs.expiresHours }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - name: Issue ADMIN invite token
        run: |
          node <<'NODE'
          const { PrismaClient, UserRole } = require("@prisma/client");
          const { createHash, randomBytes } = require("crypto");

          function hashToken(token) {
            return createHash("sha256").update(token).digest("hex");
          }

          async function main() {
            const prisma = new PrismaClient();
            const cu12Id = (process.env.ADMIN_CU12_ID || "").trim();
            const expiresHoursRaw = Number(process.env.EXPIRES_HOURS || "72");
            const expiresHours = Number.isFinite(expiresHoursRaw) ? expiresHoursRaw : 72;

            if (!cu12Id || cu12Id.length < 4) {
              throw new Error("Invalid adminCu12Id");
            }
            if (expiresHours < 1 || expiresHours > 720) {
              throw new Error("expiresHours out of range");
            }

            const token = randomBytes(24).toString("base64url");
            const invite = await prisma.inviteToken.create({
              data: {
                cu12Id,
                role: UserRole.ADMIN,
                tokenHash: hashToken(token),
                expiresAt: new Date(Date.now() + expiresHours * 60 * 60 * 1000),
              },
            });

            await prisma.$disconnect();

            console.log("Admin invite issued:");
            console.log("inviteId=" + invite.id);
            console.log("cu12Id=" + cu12Id);
            console.log("token=" + token);
            console.log("expiresAt=" + invite.expiresAt.toISOString());
          }

          main().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE
