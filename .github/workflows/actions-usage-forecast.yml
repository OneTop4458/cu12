name: Actions Usage Forecast

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/actions-usage-forecast.mjs
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          ACTIONS_INCLUDED_MINUTES: "2000"
