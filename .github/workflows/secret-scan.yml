name: Secret Scan

on:
  pull_request:
  push:
    branches: ["main", "develop"]
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Run gitleaks on full history
        id: scan
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          ./gitleaks git . --redact --report-format sarif --report-path gitleaks.sarif --log-opts="--all"

      - name: Upload SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          sarif_file: gitleaks.sarif

      - name: Enforce secret scan gate
        if: steps.scan.outcome == 'failure'
        shell: bash
        run: |
          echo "::error::Secret scan detected one or more findings."
          exit 1
