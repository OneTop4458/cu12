name: Worker Consume

on:
  workflow_call:
    inputs:
      trigger:
        description: "sync | autolearn | digest"
        required: false
        type: string
        default: "sync"
      jobTypes:
        description: "Comma-separated JobType list"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      trigger:
        description: "sync | autolearn | digest"
        required: false
        default: "sync"
        type: string
      jobTypes:
        description: "Optional comma-separated JobType list"
        required: false
        default: ""
        type: string
      userId:
        description: "Optional user id"
        required: false
        type: string
  repository_dispatch:
    types: [worker_kick]

permissions:
  contents: read

concurrency:
  group: cu12-worker-consume-${{ inputs.trigger || github.event.inputs.trigger || 'sync' }}
  cancel-in-progress: false

jobs:
  consume:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      APP_MASTER_KEY: ${{ secrets.APP_MASTER_KEY }}
      WORKER_SHARED_TOKEN: ${{ secrets.WORKER_SHARED_TOKEN }}
      WEB_INTERNAL_BASE_URL: ${{ secrets.WEB_INTERNAL_BASE_URL }}
      CU12_BASE_URL: ${{ secrets.CU12_BASE_URL }}
      POLL_INTERVAL_MS: 30000
      AUTOLEARN_TIME_FACTOR: ${{ secrets.AUTOLEARN_TIME_FACTOR }}
      AUTOLEARN_PROGRESS_HEARTBEAT_SECONDS: 60
      AUTOLEARN_STALL_TIMEOUT_SECONDS: 1200
      AUTOLEARN_MAX_TASKS: ${{ secrets.AUTOLEARN_MAX_TASKS }}
      WORKER_ONCE_IDLE_GRACE_MS: 60000
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      WORKER_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - id: resolve
        shell: bash
        run: |
          JOB_TYPES="${{ inputs.jobTypes }}"
          if [ -z "$JOB_TYPES" ]; then
            case "${{ inputs.trigger }}" in
              autolearn) JOB_TYPES="AUTOLEARN" ;;
              digest) JOB_TYPES="MAIL_DIGEST" ;;
              sync) JOB_TYPES="SYNC,NOTICE_SCAN" ;;
              *) JOB_TYPES="SYNC,AUTOLEARN,NOTICE_SCAN,MAIL_DIGEST" ;;
            esac
          fi

          echo "job_types=$JOB_TYPES" >> "$GITHUB_OUTPUT"

          if [ "$JOB_TYPES" = "MAIL_DIGEST" ]; then
            echo "needs_playwright=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_playwright=true" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci --prefer-offline --no-audit
      - if: ${{ steps.resolve.outputs.needs_playwright == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-
      - if: ${{ steps.resolve.outputs.needs_playwright == 'true' }}
        run: npx playwright install chromium
      - run: npm --workspace @cu12/worker run once -- --types=${{ steps.resolve.outputs.job_types }}
