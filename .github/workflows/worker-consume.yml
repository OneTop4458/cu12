name: Worker Consume

on:
  workflow_call:
    inputs:
      trigger:
        description: "sync | autolearn | digest"
        required: false
        type: string
        default: "sync"
      jobTypes:
        description: "Comma-separated JobType list"
        required: false
        type: string
        default: ""
      userId:
        description: "Optional user id"
        required: false
        type: string
        default: ""
      approvalId:
        description: "Optional Cyber Campus approval session id"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      trigger:
        description: "sync | autolearn | digest"
        required: false
        default: "sync"
        type: string
      jobTypes:
        description: "Optional comma-separated JobType list"
        required: false
        default: ""
        type: string
      userId:
        description: "Optional user id"
        required: false
        type: string
      approvalId:
        description: "Optional Cyber Campus approval session id"
        required: false
        type: string
  repository_dispatch:
    types: [worker_kick]

permissions:
  contents: read

jobs:
  consume:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      APP_MASTER_KEY: ${{ secrets.APP_MASTER_KEY }}
      WORKER_SHARED_TOKEN: ${{ secrets.WORKER_SHARED_TOKEN }}
      WEB_INTERNAL_BASE_URL: ${{ secrets.WEB_INTERNAL_BASE_URL }}
      CU12_BASE_URL: ${{ secrets.CU12_BASE_URL }}
      PLAYWRIGHT_ACCEPT_LANGUAGE: ko-KR,ko;q=0.9,en-US;q=0.8,en;q=0.7
      PLAYWRIGHT_NAVIGATION_TIMEOUT_MS: 120000
      PLAYWRIGHT_NAVIGATION_RETRIES: 2
      PLAYWRIGHT_NAVIGATION_RETRY_BASE_MS: 5000
      AUTOLEARN_HUMANIZATION_ENABLED: true
      AUTOLEARN_DELAY_MIN_MS: 180
      AUTOLEARN_DELAY_MAX_MS: 900
      AUTOLEARN_NAV_SETTLE_MIN_MS: 600
      AUTOLEARN_NAV_SETTLE_MAX_MS: 1800
      AUTOLEARN_TYPING_DELAY_MIN_MS: 40
      AUTOLEARN_TYPING_DELAY_MAX_MS: 120
      POLL_INTERVAL_MS: 30000
      WORKER_INTERNAL_API_TIMEOUT_MS: 15000
      WORKER_INTERNAL_API_MAX_RETRIES: 2
      WORKER_INTERNAL_API_RETRY_BASE_MS: 1000
      AUTOLEARN_TIME_FACTOR: ${{ secrets.AUTOLEARN_TIME_FACTOR }}
      AUTOLEARN_PROGRESS_HEARTBEAT_SECONDS: 60
      AUTOLEARN_STALL_TIMEOUT_SECONDS: 1200
      AUTOLEARN_CHUNK_TARGET_SECONDS: 3600
      AUTOLEARN_MAX_TASKS: ${{ secrets.AUTOLEARN_MAX_TASKS }}
      CYBER_CAMPUS_AUTOLEARN_CHUNK_TARGET_SECONDS: 21000
      CYBER_CAMPUS_AUTOLEARN_MAX_TASKS: 200
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      WORKER_ONCE_IDLE_GRACE_MS: 60000
      WORKER_RETRY_WAIT_MAX_MS: 1200000
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      WORKER_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Record worker workflow start time
        shell: bash
        run: echo "WORKER_WORKFLOW_STARTED_AT_MS=$(($(date +%s) * 1000))" >> "$GITHUB_ENV"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b
        with:
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - id: resolve
        shell: bash
        env:
          INPUT_JOB_TYPES: ${{ inputs.jobTypes }}
          INPUT_TRIGGER: ${{ inputs.trigger }}
        run: |
          JOB_TYPES="$INPUT_JOB_TYPES"
          if [ -z "$JOB_TYPES" ]; then
            case "$INPUT_TRIGGER" in
              autolearn) JOB_TYPES="AUTOLEARN" ;;
              digest) JOB_TYPES="MAIL_DIGEST" ;;
              sync) JOB_TYPES="SYNC,NOTICE_SCAN" ;;
              *) JOB_TYPES="SYNC,AUTOLEARN,NOTICE_SCAN,MAIL_DIGEST" ;;
            esac
          fi

          NORMALIZED_JOB_TYPES=$(printf '%s' "$JOB_TYPES" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]')
          IFS=',' read -ra JOB_TYPE_ITEMS <<< "$NORMALIZED_JOB_TYPES"
          for JOB_TYPE in "${JOB_TYPE_ITEMS[@]}"; do
            case "$JOB_TYPE" in
              SYNC|AUTOLEARN|NOTICE_SCAN|MAIL_DIGEST) ;;
              *)
                echo "Invalid job type: $JOB_TYPE" >&2
                exit 1
                ;;
            esac
          done

          printf 'job_types=%s\n' "$NORMALIZED_JOB_TYPES" >> "$GITHUB_OUTPUT"

          if [[ "$INPUT_TRIGGER" == "cyber-campus-approval" || ",$NORMALIZED_JOB_TYPES," == *",AUTOLEARN,"* || ",$NORMALIZED_JOB_TYPES," == *",SYNC,"* || ",$NORMALIZED_JOB_TYPES," == *",NOTICE_SCAN,"* ]]; then
            echo "needs_playwright=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_playwright=false" >> "$GITHUB_OUTPUT"
          fi

      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:generate
      - if: ${{ steps.resolve.outputs.needs_playwright == 'true' }}
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-
      - if: ${{ steps.resolve.outputs.needs_playwright == 'true' }}
        run: pnpm exec playwright install chromium
      - shell: bash
        env:
          RESOLVED_JOB_TYPES: ${{ steps.resolve.outputs.job_types }}
          INPUT_USER_ID: ${{ inputs.userId }}
          INPUT_APPROVAL_ID: ${{ inputs.approvalId }}
        run: |
          RUN_ARGS=("--types=$RESOLVED_JOB_TYPES")
          if [ -n "$INPUT_USER_ID" ]; then
            RUN_ARGS+=("--userId=$INPUT_USER_ID")
          fi
          if [ -n "$INPUT_APPROVAL_ID" ]; then
            RUN_ARGS+=("--approvalId=$INPUT_APPROVAL_ID")
          fi
          pnpm --filter @cu12/worker run once -- "${RUN_ARGS[@]}"
