name: Scheduled Sync Dispatch

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    outputs:
      created_count: ${{ steps.dispatch.outputs.created_count }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - id: dispatch
        run: |
          npm --workspace @cu12/worker run dispatch:sync -- --min-interval-minutes=120 --summary-json=dispatch-summary.json
          CREATED_COUNT=$(node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync('dispatch-summary.json','utf8')); process.stdout.write(String(data.createdCount ?? 0));")
          echo "created_count=$CREATED_COUNT" >> "$GITHUB_OUTPUT"

  consume:
    needs: dispatch
    if: ${{ needs.dispatch.outputs.created_count != '0' }}
    uses: ./.github/workflows/worker-consume.yml
    with:
      trigger: sync
      jobTypes: SYNC,NOTICE_SCAN
    secrets: inherit
