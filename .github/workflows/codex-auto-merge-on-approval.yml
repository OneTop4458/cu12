name: PR Auto Merge On CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          number="${{ github.event.pull_request.number }}"
          state="$(gh pr view "$number" -R "$GH_REPO" --json state,isDraft --jq '.state + ":" + (.isDraft|tostring)')"
          if [ "$state" != "OPEN:false" ]; then
            echo "PR #$number is not mergeable state ($state). Skip."
            exit 0
          fi

          gh pr merge "$number" -R "$GH_REPO" --auto --squash --delete-branch
