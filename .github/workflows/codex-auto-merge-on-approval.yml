name: PR Auto Merge On CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled, closed]

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.event.action != 'closed' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          number="${{ github.event.pull_request.number }}"
          state="$(gh pr view "$number" -R "$GH_REPO" --json state,isDraft --jq '.state + ":" + (.isDraft|tostring)')"
          if [ "$state" != "OPEN:false" ]; then
            echo "PR #$number is not mergeable state ($state). Skip."
            exit 0
          fi

          labels="$(gh pr view "$number" -R "$GH_REPO" --json labels --jq '.labels[].name')"
          if ! grep -Fxq "automerge" <<< "$labels"; then
            echo "PR #$number has no automerge label. Skip."
            exit 0
          fi

          changed_files="$(gh pr view "$number" -R "$GH_REPO" --json files --jq '.files[].path')"
          while IFS= read -r path; do
            [ -n "$path" ] || continue
            case "$path" in
              .github/workflows/*|prisma/*|scripts/*|AGENTS.md)
                echo "PR #$number touches sensitive path '$path'. Skip auto-merge."
                exit 0
                ;;
            esac
          done <<< "$changed_files"

          gh pr merge "$number" -R "$GH_REPO" --auto --squash --delete-branch

  dispatch-deploy:
    if: >
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch main deploy when deploy-relevant files changed
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          number="${{ github.event.pull_request.number }}"
          changed_files="$(gh pr view "$number" -R "$GH_REPO" --json files --jq '.files[].path')"
          should_deploy=false

          while IFS= read -r path; do
            [ -n "$path" ] || continue
            case "$path" in
              apps/web/*|apps/worker/*|packages/*|prisma/*|package.json|pnpm-lock.yaml|.github/workflows/deploy-vercel.yml)
                should_deploy=true
                break
                ;;
            esac
          done <<< "$changed_files"

          if [ "$should_deploy" != "true" ]; then
            echo "Merged PR #$number changed no deploy-relevant files. Skip deploy dispatch."
            exit 0
          fi

          gh workflow run deploy-vercel.yml -R "$GH_REPO" --ref main
