openapi: 3.1.0
info:
  title: Catholic University Automation API
  version: 0.5.0
  description: >-
    API contract for the Catholic University Automation web application.
    This document reflects the runtime behavior implemented in apps/web as of 2026-03-07.
servers:
  - url: https://your-app.example.com

tags:
  - name: Health
  - name: Session
  - name: Auth
  - name: CU12
  - name: Jobs
  - name: CyberCampus
  - name: Dashboard
  - name: Mail
  - name: Admin
  - name: SiteNotice
  - name: WorkerInternal

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service is reachable and core database connectivity is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Critical dependency failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/session/context:
    get:
      tags: [Session]
      summary: Get actor/effective session context
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Session context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionContext"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/me:
    get:
      tags: [Session]
      summary: Get actor/effective user profile
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User profile payload
        "401":
          description: Unauthorized
        "404":
          description: User not found

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Step 1 login with the Catholic University portal account
      description: >-
        Verifies the shared Catholic University portal credential in real time.
        The same credential is reused across CU12 and Cyber Campus.
        Returns AUTHENTICATED for approved mapped users, APPROVAL_PENDING for first-login users,
        or CONSENT_REQUIRED when required policies must be accepted.
        Rejects cross-origin mutation requests when `Origin`/`Referer` does not match.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cu12Id, cu12Password]
              properties:
                cu12Id:
                  type: string
                  minLength: 4
                  maxLength: 80
                cu12Password:
                  type: string
                  minLength: 4
                  maxLength: 120
                campus:
                  $ref: "#/components/schemas/Campus"
                rememberSession:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Authenticated, approval pending, or consent required
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginAuthenticated"
                  - $ref: "#/components/schemas/LoginApprovalPending"
                  - $ref: "#/components/schemas/LoginConsentRequired"
        "400":
          description: Validation failed (invalid JSON body or missing/invalid fields)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication failed or account disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (invalid CSRF origin or approval rejected)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many authentication attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Required policy documents are not configured or CU12 is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal database or server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/consent:
    post:
      tags: [Auth]
      summary: Submit required policy consent and complete login
      description: >-
        Finalizes login after required policy consent and issues the session cookies.
        Rejects cross-origin mutation requests when `Origin`/`Referer` does not match.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [consentToken, acceptedPolicies]
              properties:
                consentToken:
                  type: string
                  minLength: 20
                acceptedPolicies:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [type, version]
                    properties:
                      type:
                        $ref: "#/components/schemas/PolicyDocumentType"
                      version:
                        type: integer
                        minimum: 1
      responses:
        "200":
          description: Authenticated after policy consent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginAuthenticated"
        "400":
          description: Missing required consent or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Consent challenge token invalid/expired or account disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (invalid CSRF origin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Policy version mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Required policy documents are not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and clear session/idle/impersonation cookies
      description: Rejects cross-origin mutation requests when `Origin`/`Referer` does not match.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logged out
        "403":
          description: Forbidden (invalid CSRF origin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/session/refresh:
    post:
      tags: [Session]
      summary: Refresh idle session window
      description: >-
        Extends the idle session cookie (`cu12_idle`) when current auth cookies are valid.
        Keeps absolute session expiry unchanged.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Idle window refreshed
          content:
            application/json:
              schema:
                type: object
                required: [ok, expiresInSeconds, rememberSession]
                properties:
                  ok:
                    type: boolean
                  expiresInSeconds:
                    type: integer
                  rememberSession:
                    type: boolean
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/policies:
    get:
      tags: [Admin]
      summary: Get required policy documents (admin only)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Policy document list
          content:
            application/json:
              schema:
                type: object
                required: [requiredTypes, policies, history, profile]
                properties:
                  requiredTypes:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyDocumentType"
                  policies:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyDocument"
                  history:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyHistoryGroup"
                  profile:
                    $ref: "#/components/schemas/PolicyProfile"
        "403":
          description: Forbidden
    post:
      tags: [Admin]
      summary: Manually re-queue policy update mails for current active policies
      security:
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                policyTypes:
                  type: array
                  items:
                    $ref: "#/components/schemas/PolicyDocumentType"
      responses:
        "200":
          description: Policy update mail jobs queued
        "400":
          description: No active policy versions available or invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to queue policy update mails
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Admin]
      summary: Upsert required policy documents (admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: At least one of `policies` or `profile` is required.
              properties:
                policies:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [type, content, isActive]
                    properties:
                      type:
                        $ref: "#/components/schemas/PolicyDocumentType"
                      content:
                        type: string
                        minLength: 1
                        maxLength: 20000
                      isActive:
                        type: boolean
                profile:
                  $ref: "#/components/schemas/PolicyProfileInput"
      responses:
        "200":
          description: Policy documents updated
          content:
            application/json:
              schema:
                type: object
                required: [updated, requiredTypes, policies, history, profile, publishedChanges, mailQueue]
                properties:
                  updated:
                    type: boolean
                  requiredTypes:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyDocumentType"
                  policies:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyDocument"
                  history:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyHistoryGroup"
                  profile:
                    $ref: "#/components/schemas/PolicyProfile"
                  publishedChanges:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyChange"
                  mailQueue:
                    $ref: "#/components/schemas/PolicyMailQueueSummary"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden

  /api/cu12/account:
    get:
      tags: [CU12]
      summary: Get the shared portal credential mapping for the effective user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Account payload
          content:
            application/json:
              schema:
                type: object
                required: [account]
                properties:
                  account:
                    allOf:
                      - $ref: "#/components/schemas/Cu12Account"
                    nullable: true
        "401":
          description: Unauthorized
    post:
      tags: [CU12]
      summary: Connect/update the shared portal credential and queue sync for the current service
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cu12Id, cu12Password]
              properties:
                provider:
                  type: string
                  enum: [CU12, CYBER_CAMPUS]
                cu12Id:
                  type: string
                  minLength: 4
                  maxLength: 80
                cu12Password:
                  type: string
                  minLength: 4
                  maxLength: 120
                campus:
                  $ref: "#/components/schemas/Campus"
                  nullable: true
      responses:
        "200":
          description: Connected and sync queued
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "409":
          description: Sync is blocked for test users (`TEST_USER_SYNC_BLOCKED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [CU12]
      summary: Alias of POST /api/cu12/account
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Connected and sync queued
        "409":
          description: Sync is blocked for test users (`TEST_USER_SYNC_BLOCKED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/cu12/automation:
    patch:
      tags: [CU12]
      summary: Update automation flags and the current dashboard service
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentProvider:
                  type: string
                  enum: [CU12, CYBER_CAMPUS]
                autoLearnEnabled:
                  type: boolean
                quizAutoSolveEnabled:
                  type: boolean
                detectActivitiesEnabled:
                  type: boolean
                emailDigestEnabled:
                  type: boolean
      responses:
        "200":
          description: Updated

  /api/cu12/validate-login:
    post:
      tags: [CU12]
      summary: Queue sync job to validate saved CU12 account
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Validation job queued
        "400":
          description: CU12 account is not connected
        "401":
          description: Unauthorized
        "409":
          description: Sync is blocked for test users (`TEST_USER_SYNC_BLOCKED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/jobs/sync-now:
    post:
      tags: [Jobs]
      summary: Queue SYNC jobs for one or more providers
      security:
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                providers:
                  type: array
                  maxItems: 2
                  items:
                    type: string
                    enum: [CU12, CYBER_CAMPUS]
      responses:
        "200":
          description: Multi-provider sync queue and dispatch status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncDispatchResponse"
        "409":
          description: Sync is blocked for test users (`TEST_USER_SYNC_BLOCKED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/jobs/autolearn-request:
    post:
      tags: [Jobs]
      summary: Queue AUTOLEARN job or start asynchronous Cyber Campus approval/requirement checking
      security:
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  enum: [CU12, CYBER_CAMPUS]
                mode:
                  type: string
                  enum: [SINGLE_NEXT, SINGLE_ALL, ALL_COURSES]
                  default: ALL_COURSES
                lectureSeq:
                  type: integer
                reason:
                  type: string
      responses:
        "200":
          description: >-
            AUTOLEARN queue status. For Cyber Campus, the first response may only acknowledge
            blocked job creation while the worker checks real lecture contexts, determines whether
            secondary auth is needed, and prepares approval methods asynchronously. Once a Cyber Campus
            VOD starts, the worker keeps the live player context open for the full remaining watch time
            and handles provider dialogs before treating the task as complete. The dashboard polling
            endpoint later surfaces `cyberCampus.approval` only when user action is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutolearnDispatchResponse"

  /api/jobs:
    get:
      tags: [Jobs]
      summary: List jobs for effective user
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [SYNC, AUTOLEARN, NOTICE_SCAN, MAIL_DIGEST]
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, BLOCKED, RUNNING, SUCCEEDED, FAILED, CANCELED]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                type: object
                required: [jobs]
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobItem"

  /api/jobs/{jobId}:
    get:
      tags: [Jobs]
      summary: Get job detail
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetail"
        "404":
          description: Job not found

  /api/jobs/{jobId}/cancel:
    post:
      tags: [Jobs]
      summary: Cancel a pending or running job
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancel result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobCancelResponse"
        "404":
          description: Job not found
        "401":
          description: Unauthorized

  /api/cyber-campus/approval/{approvalId}:
    get:
      tags: [CyberCampus]
      summary: Get Cyber Campus approval-session state
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: approvalId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cyber Campus approval state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CyberCampusApprovalEnvelope"
        "401":
          description: Unauthorized
        "404":
          description: Approval session not found
    delete:
      tags: [CyberCampus]
      summary: Cancel Cyber Campus approval-session and blocked auto-learn job
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: approvalId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approval session canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CyberCampusApprovalEnvelope"
        "401":
          description: Unauthorized
        "404":
          description: Approval session not found

  /api/cyber-campus/approval/{approvalId}/start:
    post:
      tags: [CyberCampus]
      summary: Persist the selected Cyber Campus secondary-auth method and dispatch browser-context worker processing
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: approvalId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [way]
              properties:
                way:
                  type: integer
                param:
                  type: string
      responses:
        "200":
          description: Current approval snapshot after queuing the start action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CyberCampusApprovalEnvelope"
        "400":
          description: Invalid approval state or payload
        "401":
          description: Unauthorized
        "404":
          description: Approval session not found

  /api/cyber-campus/approval/{approvalId}/confirm:
    post:
      tags: [CyberCampus]
      summary: Persist the submitted Cyber Campus authentication code and dispatch browser-context worker confirmation
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: approvalId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
      responses:
        "200":
          description: Approval status after queuing confirmation; `PENDING` means worker processing continues asynchronously
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CyberCampusApprovalConfirmResponse"
        "400":
          description: Invalid approval state or payload
        "401":
          description: Unauthorized
        "404":
          description: Approval session not found

  /api/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Dashboard summary counters
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Summary payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /api/dashboard/bootstrap:
    get:
      tags: [Dashboard]
      summary: Aggregated dashboard bootstrap payload
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: deadlinesLimit
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: notificationsLimit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: jobsLimit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Lightweight dashboard bootstrap payload for initial page load
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardBootstrapResponse"
        "401":
          description: Unauthorized

  /api/user-guide/dashboard-manual:
    patch:
      tags: [Dashboard]
      summary: Mark the signed-in user's dashboard manual as seen
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [seenVersion]
              properties:
                seenVersion:
                  type: string
                  enum: [dashboard-manual-v1]
      responses:
        "200":
          description: Updated guide state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGuideResponse"
        "400":
          description: Invalid version
        "401":
          description: Unauthorized

  /api/dashboard/status:
    get:
      tags: [Dashboard]
      summary: Lightweight dashboard status payload for polling
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: jobsLimit
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Status payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStatusResponse"
        "401":
          description: Unauthorized

  /api/dashboard/courses:
    get:
      tags: [Dashboard]
      summary: Course snapshot list
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Course list payload
          content:
            application/json:
              schema:
                type: object
                required: [courses]
                properties:
                  courses:
                    type: array
                    items:
                      $ref: "#/components/schemas/DashboardCourse"

  /api/dashboard/courses/{lectureSeq}/detail:
    get:
      tags: [Dashboard]
      summary: Detailed week/task breakdown for one course
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: lectureSeq
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course detail payload
          content:
            application/json:
              schema:
                type: object
                required: [detail]
                properties:
                  detail:
                    $ref: "#/components/schemas/DashboardCourseDetail"
        "400":
          description: Invalid lecture sequence
        "401":
          description: Unauthorized
        "404":
          description: Course not found

  /api/dashboard/diagnostics:
    get:
      tags: [Dashboard]
      summary: Dashboard diagnostics for parser/data quality
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: lectureSeq
          required: false
          schema:
            type: integer
            minimum: 1
        - in: query
          name: sampleLimit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Diagnostics payload
          content:
            application/json:
              schema:
                type: object
                required: [diagnostics]
                properties:
                  diagnostics:
                    $ref: "#/components/schemas/DashboardDiagnostics"
        "400":
          description: Invalid query
        "401":
          description: Unauthorized

  /api/dashboard/deadlines:
    get:
      tags: [Dashboard]
      summary: Upcoming pending task deadlines
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Deadline list
          content:
            application/json:
              schema:
                type: object
                required: [deadlines]
                properties:
                  deadlines:
                    type: array
                    items:
                      $ref: "#/components/schemas/DashboardDeadline"

  /api/dashboard/courses/{lectureSeq}/notices:
    get:
      tags: [Dashboard]
      summary: Notices for one course
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: lectureSeq
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notice list
          content:
            application/json:
              schema:
                type: object
                required: [notices]
                properties:
                  notices:
                    type: array
                    items:
                      $ref: "#/components/schemas/DashboardNotice"

  /api/dashboard/notices/{noticeId}/read:
    patch:
      tags: [Dashboard]
      summary: Mark notice as read
      security:
        - cookieAuth: []
      parameters:
        - in: path
