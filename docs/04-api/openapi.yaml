openapi: 3.1.0
info:
  title: CU12 Automation API
  version: 0.1.0
  description: CU12 자동화 서비스 API 명세
servers:
  - url: https://your-app.example.com
paths:
  /api/auth/invite:
    get:
      summary: List invites
      security: [{ cookieAuth: [] }]
      responses:
        '200':
          description: OK
    post:
      summary: Create invite token (admin)
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
                role: { type: string, enum: [ADMIN, USER], default: USER }
                expiresHours: { type: integer, minimum: 1, maximum: 720, default: 72 }
      responses:
        '200':
          description: Created
  /api/auth/invite/accept:
    post:
      summary: Accept invite and create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, name, password]
              properties:
                token: { type: string }
                name: { type: string }
                password: { type: string }
      responses:
        '201': { description: Created }
  /api/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200': { description: OK }
  /api/auth/logout:
    post:
      summary: Logout
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }
  /api/me:
    get:
      summary: Get current user
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }
  /api/cu12/account:
    get:
      summary: Get CU12 account settings
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }
    post:
      summary: Connect/update CU12 account
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cu12Id, cu12Password, campus]
              properties:
                cu12Id: { type: string }
                cu12Password: { type: string }
                campus: { type: string, enum: [SONGSIM, SONGSIN] }
      responses:
        '200': { description: OK }
    patch:
      summary: Alias of account POST
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }
  /api/cu12/automation:
    patch:
      summary: Update automation switches
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                autoLearnEnabled: { type: boolean }
                detectActivitiesEnabled: { type: boolean }
                emailDigestEnabled: { type: boolean }
      responses:
        '200': { description: OK }
  /api/cu12/validate-login:
    post:
      summary: Queue login validation sync
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }
  /api/jobs/sync-now:
    post:
      summary: Queue sync job
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }
  /api/jobs/autolearn-request:
    post:
      summary: Queue auto-learning job
      security: [{ cookieAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                lectureSeq: { type: integer }
                reason: { type: string }
      responses:
        '200': { description: OK }
  /api/jobs:
    get:
      summary: List jobs
      security: [{ cookieAuth: [] }]
      parameters:
        - in: query
          name: type
          schema: { type: string, enum: [SYNC, AUTOLEARN, NOTICE_SCAN, MAIL_DIGEST] }
        - in: query
          name: status
          schema: { type: string, enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELED] }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        '200': { description: OK }
  /api/jobs/{jobId}:
    get:
      summary: Get job detail
      security: [{ cookieAuth: [] }]
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/dashboard/summary:
    get:
      summary: Dashboard summary
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }
  /api/dashboard/courses:
    get:
      summary: Course snapshots
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }
  /api/dashboard/courses/{lectureSeq}/notices:
    get:
      summary: Course notices
      security: [{ cookieAuth: [] }]
      parameters:
        - in: path
          name: lectureSeq
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
  /api/dashboard/notifications:
    get:
      summary: Notification events
      security: [{ cookieAuth: [] }]
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: cu12_session
