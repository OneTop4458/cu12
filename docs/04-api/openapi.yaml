                quizAutoSolveEnabled:
                  type: boolean
                detectActivitiesEnabled:
                  type: boolean
                emailDigestEnabled:
                  type: boolean
                accountStatus:
                  type: string
                  enum: [CONNECTED, NEEDS_REAUTH, ERROR]
                statusReason:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Member updated
    delete:
      tags: [Admin]
      summary: Withdraw member account (anonymize + cleanup)
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
      responses:
        "200":
          description: Member withdrawn
        "409":
          description: Member is already withdrawn
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/members/{userId}/approval:
    post:
      tags: [Admin]
      summary: Approve or reject a pending member
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [APPROVE, REJECT]
                role:
                  $ref: "#/components/schemas/UserRole"
                reason:
                  type: string
                  maxLength: 500
      responses:
        "200":
          description: Member approval updated
        "400":
          description: Invalid approval action
        "403":
          description: Forbidden
        "404":
          description: Member not found
        "409":
          description: Member is withdrawn

  /api/admin/members/{userId}/sync:
    post:
      tags: [Admin]
      summary: Queue immediate sync job for a member
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                runAfter:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        "200":
          description: Sync requested
          content:
            application/json:
              schema:
                type: object
                required:
                  - jobId
                  - status
                  - deduplicated
                  - dispatched
                  - notice
                properties:
                  jobId:
                    type: string
                  status:
                    type: string
                    enum: [PENDING, BLOCKED, RUNNING, SUCCEEDED, FAILED, CANCELED]
                  deduplicated:
                    type: boolean
                  dispatched:
                    type: boolean
                  dispatchError:
                    type: string
                    nullable: true
                  notice:
                    type: string
        "404":
          description: Member not found
        "403":
          description: Forbidden
        "409":
          description: Member is withdrawn, has no CU12 account, is inactive, or sync is blocked for test users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/logs:
    get:
      tags: [Admin]
      summary: List audit logs
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: category
          schema:
            type: string
            enum:
              [AUTH, ADMIN, JOB, WORKER, MAIL, PARSER, SECURITY, IMPERSONATION]
        - in: query
          name: severity
          schema:
            type: string
            enum: [INFO, WARN, ERROR]
        - in: query
          name: targetUserId
          schema:
            type: string
        - in: query
          name: actorUserId
          schema:
            type: string
        - in: query
          name: targetQuery
          schema:
            type: string
          description: Portal ID, internal user ID, or partial display name
        - in: query
          name: actorQuery
          schema:
            type: string
          description: Portal ID, internal user ID, or partial display name
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        responses:
        "200":
          description: Audit log list
          content:
            application/json:
              schema:
                type: object
                required: [logs, pagination]
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                      required: [id, category, severity, message, createdAt]
                      properties:
                        id:
                          type: string
                        category:
                          type: string
                          enum: [AUTH, ADMIN, JOB, WORKER, MAIL, PARSER, SECURITY, IMPERSONATION]
                        severity:
                          type: string
                          enum: [INFO, WARN, ERROR]
                        message:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                        actor:
                          type: object
                          nullable: true
                          properties:
                            email:
                              type: string
                              format: email
                        target:
                          type: object
                          nullable: true
                          properties:
                            email:
                              type: string
                              format: email
                  pagination:
                    type: object
                    required: [page, limit, total, totalPages, hasNextPage, hasPrevPage]
                    properties:
                      page:
                        type: integer
                        minimum: 1
                      limit:
                        type: integer
                        minimum: 1
                        maximum: 500
                      total:
                        type: integer
                        minimum: 0
                      totalPages:
                        type: integer
                        minimum: 1
                      hasNextPage:
                        type: boolean
                      hasPrevPage:
                        type: boolean
    delete:
      tags: [Admin]
      summary: Purge audit logs and keep one audit trail entry
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Audit logs purged
          content:
            application/json:
              schema:
                type: object
                required: [deleted, retained, retainedLogId]
                properties:
                  deleted:
                    type: integer
                    minimum: 0
                  retained:
                    type: integer
                    minimum: 1
                  retainedLogId:
                    type: string
        "403":
          description: Forbidden

  /api/admin/members/{userId}/mail-test:
    post:
      tags: [Admin]
      summary: Send a mail test message to a member
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                to:
                  type: string
                  format: email
                subject:
                  type: string
                  maxLength: 120
                message:
                  type: string
                  maxLength: 3000
      responses:
        "200":
          description: Mail test sent
          content:
            application/json:
              schema:
                type: object
                required: [sent, to, reason]
                properties:
                  sent:
                    type: boolean
                  to:
                    type: string
                    format: email
                  reason:
                    type: string
                    nullable: true
        "400":
          description: SMTP not configured or send failed
        "403":
          description: Forbidden
        "404":
          description: User not found
        "409":
          description: Cannot send to inactive or withdrawn member

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: cu12_session
    workerToken:
      type: apiKey
      in: header
      name: x-worker-token

  schemas:
    UserRole:
      type: string
      enum: [ADMIN, USER]

    UserApprovalStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]

    PolicyDocumentType:
      type: string
      enum: [PRIVACY_POLICY, TERMS_OF_SERVICE]

    Campus:
      type: string
      enum: [SONGSIM, SONGSIN]
      default: SONGSIM

    SessionUser:
      type: object
      required: [userId, email, role]
      properties:
        userId:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"

    SessionContext:
      type: object
      required: [actor, effective, impersonating]
      properties:
        actor:
          $ref: "#/components/schemas/SessionUser"
        effective:
          $ref: "#/components/schemas/SessionUser"
        impersonating:
          type: boolean

    SessionPolicy:
      type: object
      required: [rememberSession, sessionMaxAgeSeconds, idleMaxAgeSeconds]
      properties:
        rememberSession:
          type: boolean
        sessionMaxAgeSeconds:
          type: integer
        idleMaxAgeSeconds:
          type: integer

    LoginAuthenticated:
      type: object
      required: [stage, user, firstLogin, session]
      properties:
        stage:
          type: string
          enum: [AUTHENTICATED]
        user:
          type: object
          required: [userId, cu12Id, role]
          properties:
            userId:
              type: string
            cu12Id:
              type: string
            role:
              $ref: "#/components/schemas/UserRole"
        firstLogin:
          type: boolean
        session:
          $ref: "#/components/schemas/SessionPolicy"

    LoginApprovalPending:
      type: object
      required: [stage, user]
      properties:
        stage:
          type: string
          enum: [APPROVAL_PENDING]
        user:
          type: object
          required: [userId, cu12Id, role]
          properties:
            userId:
              type: string
            cu12Id:
              type: string
            role:
              $ref: "#/components/schemas/UserRole"

    LoginConsentRequired:
      type: object
      required: [stage, consentToken, consentMode, policyChanges, policies, user, firstLogin, session]
      properties:
        stage:
          type: string
          enum: [CONSENT_REQUIRED]
        consentToken:
          type: string
        consentMode:
          $ref: "#/components/schemas/PolicyConsentMode"
        policyChanges:
          type: array
          items:
            $ref: "#/components/schemas/PolicyChange"
        policies:
          type: array
          items:
            $ref: "#/components/schemas/PolicyDocument"
        user:
          type: object
          required: [userId, cu12Id, role]
          properties:
            userId:
              type: string
            cu12Id:
              type: string
            role:
              $ref: "#/components/schemas/UserRole"
        firstLogin:
          type: boolean
        session:
          $ref: "#/components/schemas/SessionPolicy"

    PolicyDocument:
      type: object
      required: [id, type, title, version, content, templateContent, publishedContent, isActive, createdAt, updatedAt]
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/PolicyDocumentType"
        title:
          type: string
        version:
          type: integer
          minimum: 1
        content:
          type: string
        templateContent:
          type: string
        publishedContent:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PolicyConsentMode:
      type: string
      enum: [INITIAL_REQUIRED, UPDATED_REQUIRED]

    PolicyChange:
      type: object
      required: [type, title, currentVersion, currentPath]
      properties:
        type:
          $ref: "#/components/schemas/PolicyDocumentType"
        title:
          type: string
        currentVersion:
          type: integer
          minimum: 1
        previousVersion:
          type: integer
          minimum: 1
          nullable: true
        currentPath:
          type: string
        previousPath:
          type: string
          nullable: true
        diffPath:
          type: string
          nullable: true

    PolicyHistoryGroup:
      type: object
      required: [type, title, documents]
      properties:
        type:
          $ref: "#/components/schemas/PolicyDocumentType"
        title:
          type: string
        documents:
          type: array
          items:
            $ref: "#/components/schemas/PolicyDocument"

    PolicyMailQueueSummary:
      type: object
      required: [queued, skipped, dispatch]
      properties:
        queued:
          type: integer
        skipped:
          type: integer
        dispatch:
          type: object
          required: [state, dispatched, errorCode]
          properties:
            state:
              type: string
            dispatched:
              type: boolean
            errorCode:
              type: string
              nullable: true

    PolicyProfileInput:
      type: object
      properties:
        companyName:
          type: string
          nullable: true
        supportEmail:
          type: string
          nullable: true
        companyAddress:
          type: string
          nullable: true
        dpoName:
          type: string
          nullable: true
        dpoTitle:
          type: string
          nullable: true
        dpoEmail:
          type: string
          nullable: true
        dpoPhone:
          type: string
          nullable: true
        jurisdictionCourt:
          type: string
          nullable: true
        effectiveDate:
          type: string
          nullable: true
        revisionDate:
          type: string
          nullable: true

    PolicyProfile:
      allOf:
        - $ref: "#/components/schemas/PolicyProfileInput"
        - type: object
          required:
            [
              companyName,
              supportEmail,
              companyAddress,
              dpoName,
              dpoTitle,
              dpoEmail,
              dpoPhone,
              jurisdictionCourt,
              effectiveDate,
              revisionDate,
              createdAt,
              updatedAt,
            ]
          properties:
            createdAt:
              type: string
              format: date-time
              nullable: true
            updatedAt:
              type: string
              format: date-time
              nullable: true

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        errorCode:
          type: string

    HealthStatus:
      type: string
      enum: [ok, degraded, error]

    HealthDatabaseCheck:
      type: object
      required: [ok, latencyMs, error]
      properties:
        ok:
          type: boolean
        latencyMs:
          type: integer
          nullable: true
        error:
          type: string
          nullable: true

    HealthWorkerDispatchCheck:
      type: object
      required: [ok, configured, owner, repo, workflowId, workflowRef, maxParallel]
      properties:
        ok:
          type: boolean
        configured:
          type: boolean
        owner:
          type: string
          nullable: true
        repo:
          type: string
          nullable: true
        workflowId:
          type: string
          nullable: true
        workflowRef:
          type: string
          nullable: true
        maxParallel:
          type: integer

    HealthWorkerCheck:
      type: object
      required:
        [ok, activeWorkerCount, latestWorkerId, latestHeartbeatAt, latestHeartbeatAgeSeconds, staleAfterSeconds]
      properties:
        ok:
          type: boolean
        activeWorkerCount:
          type: integer
        latestWorkerId:
          type: string
          nullable: true
        latestHeartbeatAt:
          type: string
          format: date-time
          nullable: true
        latestHeartbeatAgeSeconds:
          type: integer
          nullable: true
        staleAfterSeconds:
          type: integer

    HealthQueueCheck:
      type: object
      required:
        [
          ok,
          runningCount,
          pendingCount,
          blockedCount,
          staleRunningCount,
          stalePendingCount,
          oldestPendingAgeSeconds,
          oldestPendingType,
          backlogWarningThreshold,
        ]
      properties:
        ok:
          type: boolean
        runningCount:
          type: integer
        pendingCount:
          type: integer
        blockedCount:
          type: integer
        staleRunningCount:
          type: integer
        stalePendingCount:
          type: integer
        oldestPendingAgeSeconds:
          type: integer
          nullable: true
        oldestPendingType:
          type: string
          enum: [SYNC, AUTOLEARN, NOTICE_SCAN, MAIL_DIGEST]
          nullable: true
        backlogWarningThreshold:
          type: integer

    HealthChecks:
      type: object
      required: [database, workerDispatch, worker, queue]
      properties:
        database:
          $ref: "#/components/schemas/HealthDatabaseCheck"
        workerDispatch:
          $ref: "#/components/schemas/HealthWorkerDispatchCheck"
        worker:
          $ref: "#/components/schemas/HealthWorkerCheck"
        queue:
          $ref: "#/components/schemas/HealthQueueCheck"

    HealthResponse:
      type: object
      required: [ok, status, service, ts, responseTimeMs, checks, issues]
      properties:
        ok:
          type: boolean
        status:
          $ref: "#/components/schemas/HealthStatus"
        service:
          type: string
          enum: [cu12-web]
        ts:
          type: string
          format: date-time
        responseTimeMs:
          type: integer
        checks:
          $ref: "#/components/schemas/HealthChecks"
        issues:
          type: array
          items:
            type: string

    InternalWorkerJobPayload:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
        lectureSeq:
          type: integer
          nullable: true
        autoLearnMode:
          type: string
          enum: [SINGLE_NEXT, SINGLE_ALL, ALL_COURSES]
          nullable: true
        reason:
          type: string
          nullable: true
        chainSegment:
          type: integer
          minimum: 1
          nullable: true
        chainElapsedSeconds:
          type: integer
          minimum: 0
          nullable: true

    InternalWorkerClaimedJob:
      type: object
      required: [id, type, payload, attempts]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [SYNC, AUTOLEARN, NOTICE_SCAN, MAIL_DIGEST]
        payload:
          $ref: "#/components/schemas/InternalWorkerJobPayload"
        attempts:
          type: integer
          minimum: 0

    InternalWorkerJobStartRequest:
      type: object
      required: [workerId]
      properties:
        workerId:
          type: string
          minLength: 2
          maxLength: 120
        types:
          type: array
          items:
            type: string
            enum: [SYNC, AUTOLEARN, NOTICE_SCAN, MAIL_DIGEST]
          default: [SYNC, NOTICE_SCAN, AUTOLEARN]

    InternalWorkerJobStartResponse:
      type: object
      required: [job]
      properties:
        job:
          allOf:
            - $ref: "#/components/schemas/InternalWorkerClaimedJob"
          nullable: true

    InternalWorkerJobProgressRequest:
      type: object
      required: [jobId, workerId, result]
      properties:
        jobId:
          type: string
          minLength: 10
        workerId:
          type: string
          minLength: 2
          maxLength: 120
        result:
          type: object
          additionalProperties: true

    InternalWorkerJobFinishRequest:
      type: object
      required: [jobId, workerId]
      properties:
        jobId:
          type: string
          minLength: 10
        workerId:
          type: string
          minLength: 2
          maxLength: 120
        result:
          type: object
          additionalProperties: true
          nullable: true

    InternalWorkerJobFailRequest:
      type: object
      required: [jobId, workerId, error]
      properties:
        jobId:
          type: string
          minLength: 10
        workerId:
          type: string
          minLength: 2
          maxLength: 120
        error:
          type: string
          minLength: 1
          maxLength: 4000

    InternalWorkerDispatchResult:
      type: object
      required: [state, dispatched, errorCode]
      properties:
        state:
          type: string
          enum: [DISPATCHED, NOT_CONFIGURED, FAILED, SKIPPED_DUPLICATE]
        dispatched:
          type: boolean
        errorCode:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        statusCode:
          type: integer
          nullable: true

    Pagination:
      type: object
      required: [page, limit, total, totalPages, hasNextPage, hasPrevPage]
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 1
        hasNextPage:
          type: boolean
        hasPrevPage:
          type: boolean

    Cu12Account:
      type: object
      required:
        [
          provider,
          cu12Id,
          campus,
          accountStatus,
          autoLearnEnabled,
          quizAutoSolveEnabled,
          detectActivitiesEnabled,
          emailDigestEnabled,
          updatedAt,
        ]
      properties:
        provider:
          type: string
          enum: [CU12, CYBER_CAMPUS]
          description: Current dashboard/service scope for the shared portal credential.
        cu12Id:
          type: string
        campus:
          $ref: "#/components/schemas/Campus"
          nullable: true
        accountStatus:
          type: string
          enum: [CONNECTED, NEEDS_REAUTH, ERROR]
        statusReason:
          type: string
          nullable: true
        autoLearnEnabled:
          type: boolean
        quizAutoSolveEnabled:
          type: boolean
        detectActivitiesEnabled:
          type: boolean
        emailDigestEnabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time

    MailPreference:
      type: object
      required:
        [
          email,
          enabled,
          alertOnNotice,
          alertOnDeadline,
          alertOnAutolearn,
          digestEnabled,
          digestHour,
        ]
      properties:
        email:
          type: string
          format: email
        enabled:
          type: boolean
        alertOnNotice:
          type: boolean
        alertOnDeadline:
          type: boolean
        alertOnAutolearn:
          type: boolean
        digestEnabled:
          type: boolean
        digestHour:
          type: integer
          minimum: 0
          maximum: 23
        updatedAt:
          type: string
          format: date-time
          nullable: true

    DashboardMessageItem:
      type: object
      required: [provider, id, title, senderName, bodyText, sentAt, isRead, isArchived]
      properties:
        provider:
          type: string
          enum: [CU12, CYBER_CAMPUS]
        id:
          type: string
        title:
          type: string
        senderName:
          type: string
          nullable: true
        bodyText:
          type: string
        sentAt:
          type: string
          format: date-time
          nullable: true
        isRead:
          type: boolean
        isArchived:
          type: boolean

    DashboardActivityItem:
      type: object
      required: [provider, id, sourceId, kind, title, courseTitle, message, occurredAt, createdAt, isUnread, isArchived, needsAttention]
      properties:
        provider:
          type: string
          enum: [CU12, CYBER_CAMPUS]
        id:
          type: string
        sourceId:
          type: string
        kind:
          type: string
          enum: [NOTICE, NOTIFICATION, MESSAGE, SYSTEM]
        title:
          type: string
        courseTitle:
          type: string
        message:
          type: string
        occurredAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        isUnread:
          type: boolean
        isArchived:
          type: boolean
        needsAttention:
          type: boolean

    DashboardSummary:
      type: object
      required:
        [
          activeCourseCount,
          avgProgress,
          unreadNoticeCount,
          urgentTaskCount,
          upcomingDeadlines,
          nextDeadlineAt,
          lastSyncAt,
          nextAutoSyncAt,
          autoSyncIntervalHours,
          initialSyncRequired,
        ]
      properties:
        activeCourseCount:
          type: integer
        avgProgress:
          type: number
        unreadNoticeCount:
          type: integer
        urgentTaskCount:
          type: integer
        upcomingDeadlines:
          type: integer
        nextDeadlineAt:
          type: string
          format: date-time
          nullable: true
        lastSyncAt:
          type: string
          format: date-time
          nullable: true
        nextAutoSyncAt:
          type: string
          format: date-time
          nullable: true
        autoSyncIntervalHours:
          type: integer
          minimum: 1
        initialSyncRequired:
          type: boolean

    DashboardActivityTypeCounts:
      type: object
      required: [VOD, MATERIAL, QUIZ, ASSIGNMENT, ETC]
      properties:
        VOD:
          type: integer
        MATERIAL:
          type: integer
        QUIZ:
          type: integer
        ASSIGNMENT:
          type: integer
        ETC:
          type: integer

    DashboardCourseWeekSummary:
      type: object
      required:
        [
          weekNo,
          totalTaskCount,
          completedTaskCount,
          pendingTaskCount,
          totalTaskTypeCounts,
          pendingTaskTypeCounts,
        ]
      properties:
        weekNo:
          type: integer
        totalTaskCount:
          type: integer
        completedTaskCount:
          type: integer
        pendingTaskCount:
          type: integer
        totalTaskTypeCounts:
          $ref: "#/components/schemas/DashboardActivityTypeCounts"
        pendingTaskTypeCounts:
          $ref: "#/components/schemas/DashboardActivityTypeCounts"

    DashboardNextPendingTask:
      type: object
      required:
        [weekNo, lessonNo, activityType, requiredSeconds, learnedSeconds, availableFrom, dueAt]
      properties:
        weekNo:
          type: integer
        lessonNo:
          type: integer
        activityType:
          type: string
          enum: [VOD, MATERIAL, QUIZ, ASSIGNMENT, ETC]
        requiredSeconds:
          type: integer
        learnedSeconds:
