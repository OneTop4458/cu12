          nullable: true
        heartbeatAt:
          type: string
          format: date-time
          nullable: true
        progress:
          type: object
          required:
            [phase, mode, totalTasks, completedTasks, elapsedSeconds, estimatedRemainingSeconds]
          properties:
            phase:
              type: string
              enum: [PLANNING, RUNNING, DONE]
            mode:
              type: string
              enum: [SINGLE_NEXT, SINGLE_ALL, ALL_COURSES]
            totalTasks:
              type: integer
            completedTasks:
              type: integer
            elapsedSeconds:
              type: integer
              description: Real elapsed execution time accumulated so far.
            estimatedRemainingSeconds:
              type: integer
              description: >-
                Estimated remaining runtime. For Cyber Campus VOD playback this tracks real watch time
                and never applies a factor below 1x.
            heartbeatAt:
              type: string
              format: date-time
              nullable: true
            current:
              type: object
              nullable: true
              properties:
                lectureSeq:
                  type: integer
                weekNo:
                  type: integer
                lessonNo:
                  type: integer
                activityType:
                  type: string
                  enum: [VOD, MATERIAL, QUIZ, ASSIGNMENT, ETC]
                remainingSeconds:
                  type: integer
                elapsedSeconds:
                  type: integer
                  nullable: true
                courseTitle:
                  type: string
                  nullable: true
                taskTitle:
                  type: string
                  nullable: true
                questionIndex:
                  type: integer
                  nullable: true
                questionCount:
                  type: integer
                  nullable: true
                attemptsUsed:
                  type: integer
                  nullable: true
                attemptsLimit:
                  type: integer
                  nullable: true
            noOpReason:
              allOf:
                - $ref: "#/components/schemas/AutoLearnNoOpReason"
              nullable: true
            plannedTaskCount:
              type: integer
            planned:
              type: array
              items:
                $ref: "#/components/schemas/AutoLearnPlannedTask"
            truncated:
              type: boolean

    AutoLearnResult:
      type: object
      required:
        [
          type,
          mode,
          processedTaskCount,
          elapsedSeconds,
          lectureSeqs,
          plannedTaskCount,
          truncated,
          estimatedTotalSeconds,
        ]
      properties:
        type:
          type: string
          enum: [AUTOLEARN]
        mode:
          type: string
          enum: [SINGLE_NEXT, SINGLE_ALL, ALL_COURSES]
        processedTaskCount:
          type: integer
        elapsedSeconds:
          type: integer
        lectureSeqs:
          type: array
          items:
            type: integer
        plannedTaskCount:
          type: integer
        truncated:
          type: boolean
        continuationQueued:
          type: boolean
        chainLimitReached:
          type: boolean
        chainSegment:
          type: integer
          minimum: 1
        estimatedTotalSeconds:
          type: integer
          description: >-
            Estimated end-to-end runtime. For Cyber Campus VOD playback this is based on the full
            remaining watch time and never applies a factor below 1x.
        noOpReason:
          allOf:
            - $ref: "#/components/schemas/AutoLearnNoOpReason"
          nullable: true
        planned:
          type: array
          items:
            $ref: "#/components/schemas/AutoLearnPlannedTask"

    SyncProgressResult:
      type: object
      required: [kind, progress]
      properties:
        kind:
          type: string
          enum: [SYNC_PROGRESS]
        updatedAt:
          type: string
          format: date-time
          nullable: true
        progress:
          type: object
          required:
            [phase, totalCourses, completedCourses, noticeCount, taskCount, notificationCount]
          properties:
            phase:
              type: string
              enum: [COURSES, NOTICES, TASKS, NOTIFICATIONS, DONE]
            totalCourses:
              type: integer
            completedCourses:
              type: integer
            noticeCount:
              type: integer
            taskCount:
              type: integer
            notificationCount:
              type: integer
            current:
              type: object
              nullable: true
              properties:
                lectureSeq:
                  type: integer
                title:
                  type: string

    JobDetail:
      type: object
      required: [id, status, type, attempts]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [PENDING, BLOCKED, RUNNING, SUCCEEDED, FAILED, CANCELED]
        type:
          type: string
          enum: [SYNC, AUTOLEARN, NOTICE_SCAN, MAIL_DIGEST]
        attempts:
          type: integer
        updatedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
        result:
          oneOf:
            - $ref: "#/components/schemas/AutoLearnProgressResult"
            - $ref: "#/components/schemas/AutoLearnResult"
            - $ref: "#/components/schemas/SyncProgressResult"
            - type: object
          nullable: true

    AdminJob:
      type: object
      required:
        [
          id,
          userId,
          type,
          status,
          attempts,
          runAfter,
          createdAt,
          updatedAt,
          user,
        ]
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          type: string
          enum: [SYNC, AUTOLEARN, NOTICE_SCAN, MAIL_DIGEST]
        status:
          type: string
          enum: [PENDING, BLOCKED, RUNNING, SUCCEEDED, FAILED, CANCELED]
        payload:
          type: object
          nullable: true
        result:
          type: object
          nullable: true
        attempts:
          type: integer
        runAfter:
          type: string
          format: date-time
        workerId:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        lastError:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        user:
          type: object
          nullable: true
          properties:
            id:
              type: string
            email:
              type: string
              format: email
            name:
              type: string
              nullable: true

    WorkerHeartbeat:
      type: object
      required: [workerId, lastSeenAt]
      properties:
        workerId:
          type: string
        lastSeenAt:
          type: string
          format: date-time

    AdminJobReconcileResponse:
      type: object
      required:
        [checkedAt, canReconcileWithGitHub, summary, scheduleChecks, runningJobs, orphanedRunningJobs, activeRuns, ghostRuns]
      properties:
        checkedAt:
          type: string
          format: date-time
        canReconcileWithGitHub:
          type: boolean
        summary:
          $ref: "#/components/schemas/AdminJobReconcileSummary"
        scheduleChecks:
          type: array
          items:
            $ref: "#/components/schemas/AdminJobScheduleCheck"
        runningJobs:
          type: array
          items:
            $ref: "#/components/schemas/AdminJobReconcileDbItem"
        orphanedRunningJobs:
          type: array
          items:
            $ref: "#/components/schemas/AdminJobReconcileDbItem"
        activeRuns:
          type: array
          items:
            $ref: "#/components/schemas/AdminJobReconcileGhRun"
        ghostRuns:
          type: array
          items:
            $ref: "#/components/schemas/AdminJobReconcileGhRun"
        error:
          type: string
          nullable: true

    AdminJobReconcileSummary:
      type: object
      required: [runningJobsCount, orphanedRunningJobsCount, activeRunsCount, ghostRunsCount]
      properties:
        runningJobsCount:
          type: integer
        orphanedRunningJobsCount:
          type: integer
        activeRunsCount:
          type: integer
        ghostRunsCount:
          type: integer
        nonparseableWorkerIdCount:
          type: integer
          default: 0

    AdminJobScheduleCheck:
      type: object
      required: [key, workflowPath, expectedCrons, actualCrons, status, message]
      properties:
        key:
          type: string
          enum: [sync, autolearn]
        workflowPath:
          type: string
        expectedCrons:
          type: array
          items:
            type: string
        actualCrons:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [MATCH, MISMATCH, UNKNOWN]
        message:
          type: string

    AdminJobReconcileDbItem:
      type: object
      required:
        [id, userId, type, status, startedAt, createdAt, updatedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          type: string
          enum: [SYNC, AUTOLEARN, NOTICE_SCAN, MAIL_DIGEST]
        status:
          type: string
          enum: [PENDING, BLOCKED, RUNNING, SUCCEEDED, FAILED, CANCELED]
        workerId:
          type: string
          nullable: true
        runId:
          type: integer
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AdminJobReconcileGhRun:
      type: object
      required: [id, status, createdAt, updatedAt, htmlUrl]
      properties:
        id:
          type: integer
        status:
          type: string
        conclusion:
          type: string
          nullable: true
        htmlUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
