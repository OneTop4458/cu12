    AdminJobReconcileSummary:
      type: object
      required: [runningJobsCount, orphanedRunningJobsCount, activeRunsCount, ghostRunsCount]
      properties:
        runningJobsCount:
          type: integer
        orphanedRunningJobsCount:
          type: integer
        activeRunsCount:
          type: integer
        ghostRunsCount:
          type: integer
        nonparseableWorkerIdCount:
          type: integer
          default: 0

    AdminJobReconcileDbItem:
      type: object
      required:
        [id, userId, type, status, startedAt, createdAt, updatedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          type: string
          enum: [SYNC, AUTOLEARN, NOTICE_SCAN, MAIL_DIGEST]
        status:
          type: string
          enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELED]
        workerId:
          type: string
          nullable: true
        runId:
          type: integer
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AdminJobReconcileGhRun:
      type: object
      required: [id, status, createdAt, updatedAt, htmlUrl]
      properties:
        id:
          type: integer
        status:
          type: string
        conclusion:
          type: string
          nullable: true
        htmlUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

