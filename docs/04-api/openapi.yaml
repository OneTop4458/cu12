      tags: [Admin]
      summary: Cleanup historical jobs
      security:
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                olderThanDays:
                  type: integer
                  minimum: 1
                  maximum: 3650
                  default: 30
                statuses:
                  type: array
                  minItems: 1
                  maxItems: 5
                  items:
                    type: string
                    enum: [PENDING, BLOCKED, RUNNING, SUCCEEDED, FAILED, CANCELED]
                userId:
                  type: string
                  format: uuid
                scope:
                  type: string
                  enum: [safe, full]
                  default: safe
                dryRun:
                  type: boolean
                  default: false
                confirmCode:
                  type: string
      responses:
        "200":
          description: Job cleanup result
          content:
            application/json:
              schema:
                type: object
                required:
                  - deleted
                  - deletedByStatus
                  - olderThanDays
                  - statusFilter
                  - scope
                  - dryRun
                  - cutoff
                properties:
                  deleted:
                    type: integer
                    minimum: 0
                  deletedByStatus:
                    type: object
                    additionalProperties:
                      type: integer
                      minimum: 0
                    example:
                      PENDING: 0
                      RUNNING: 0
                      SUCCEEDED: 3
                      FAILED: 1
                      CANCELED: 0
                  olderThanDays:
                    type: integer
                    minimum: 1
                  statusFilter:
                    type: array
                    items:
                      type: string
                      enum: [PENDING, BLOCKED, RUNNING, SUCCEEDED, FAILED, CANCELED]
                  scope:
                    type: string
                    enum: [safe, full]
