openapi: 3.1.0
info:
  title: CU12 Automation API
  version: 0.5.0
  description: >-
    API contract for the CU12 Automation web application.
    This document reflects the runtime behavior implemented in apps/web as of 2026-03-03.
servers:
  - url: https://your-app.example.com

tags:
  - name: Health
  - name: Session
  - name: Auth
  - name: CU12
  - name: Jobs
  - name: Dashboard
  - name: Mail
  - name: Admin
  - name: SiteNotice

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /api/session/context:
    get:
      tags: [Session]
      summary: Get actor/effective session context
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Session context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionContext"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/me:
    get:
      tags: [Session]
      summary: Get actor/effective user profile
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User profile payload
        "401":
          description: Unauthorized
        "404":
          description: User not found

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Step 1 login with CU12 credentials
      description: >-
        Verifies CU12 credentials in real time.
        Returns AUTHENTICATED for mapped users, INVITE_REQUIRED for first-login users,
        or CONSENT_REQUIRED when required policies must be accepted.
        Rejects cross-origin mutation requests when `Origin`/`Referer` does not match.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cu12Id, cu12Password]
              properties:
                cu12Id:
                  type: string
                  minLength: 4
                  maxLength: 80
                cu12Password:
                  type: string
                  minLength: 4
                  maxLength: 120
                campus:
                  $ref: "#/components/schemas/Campus"
                rememberSession:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Authenticated or invite required
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginAuthenticated"
                  - $ref: "#/components/schemas/LoginInviteRequired"
                  - $ref: "#/components/schemas/LoginConsentRequired"
        "401":
          description: Authentication failed (credentials/account state)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (invalid CSRF origin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many authentication attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Required policy documents are not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/login/invite:
    post:
      tags: [Auth]
      summary: Step 2 invite verification (first login)
      description: >-
        Validates one-time invite code after CU12 login challenge.
        Rejects cross-origin mutation requests when `Origin`/`Referer` does not match.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challengeToken, inviteCode]
              properties:
                challengeToken:
                  type: string
                  minLength: 20
                inviteCode:
                  type: string
                  minLength: 8
                  maxLength: 200
                rememberSession:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Authenticated after invite verification or consent required
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginAuthenticated"
                  - $ref: "#/components/schemas/LoginConsentRequired"
        "401":
          description: Challenge token invalid/expired or invite verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (invalid CSRF origin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many invite verification attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Required policy documents are not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/consent:
    post:
      tags: [Auth]
      summary: Submit required policy consent and complete login
      description: >-
        Finalizes login after required policy consent.
        Rejects cross-origin mutation requests when `Origin`/`Referer` does not match.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [consentToken, acceptedPolicies]
              properties:
                consentToken:
                  type: string
                  minLength: 20
                acceptedPolicies:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [type, version]
                    properties:
                      type:
                        $ref: "#/components/schemas/PolicyDocumentType"
                      version:
                        type: integer
                        minimum: 1
      responses:
        "200":
          description: Authenticated after policy consent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginAuthenticated"
        "400":
          description: Missing required consent or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Consent challenge token invalid/expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (invalid CSRF origin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Policy version mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Required policy documents are not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and clear session/idle/impersonation cookies
      description: Rejects cross-origin mutation requests when `Origin`/`Referer` does not match.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logged out
        "403":
          description: Forbidden (invalid CSRF origin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/session/refresh:
    post:
      tags: [Session]
      summary: Refresh idle session window
      description: >-
        Extends the idle session cookie (`cu12_idle`) when current auth cookies are valid.
        Keeps absolute session expiry unchanged.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Idle window refreshed
          content:
            application/json:
              schema:
                type: object
                required: [ok, expiresInSeconds, rememberSession]
                properties:
                  ok:
                    type: boolean
                  expiresInSeconds:
                    type: integer
                  rememberSession:
                    type: boolean
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/invite:
    get:
      tags: [Admin]
      summary: List invite tokens (admin only)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Invite list
          content:
            application/json:
              schema:
                type: object
                required: [invites]
                properties:
                  invites:
                    type: array
                    items:
                      $ref: "#/components/schemas/InviteToken"
        "403":
          description: Forbidden
    post:
      tags: [Admin]
      summary: Create invite token (admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cu12Id]
              properties:
                cu12Id:
                  type: string
                  minLength: 4
                  maxLength: 80
                role:
                  $ref: "#/components/schemas/UserRole"
                expiresHours:
                  type: integer
                  minimum: 1
                  maximum: 720
                  default: 72
                isActive:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Invite token created
        "403":
          description: Forbidden
    patch:
      tags: [Admin]
      summary: Activate/deactivate invite token
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inviteId, isActive]
              properties:
                inviteId:
                  type: string
                isActive:
                  type: boolean
      responses:
        "200":
          description: Invite token updated
        "403":
          description: Forbidden
    delete:
      tags: [Admin]
      summary: Delete invite token
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inviteId]
              properties:
                inviteId:
                  type: string
      responses:
        "200":
          description: Invite token deleted
        "403":
          description: Forbidden
        "404":
          description: Invite token not found

  /api/admin/policies:
    get:
      tags: [Admin]
      summary: Get required policy documents (admin only)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Policy document list
          content:
            application/json:
              schema:
                type: object
                required: [requiredTypes, policies, profile]
                properties:
                  requiredTypes:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyDocumentType"
                  policies:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyDocument"
                  profile:
                    $ref: "#/components/schemas/PolicyProfile"
        "403":
          description: Forbidden
    put:
      tags: [Admin]
      summary: Upsert required policy documents (admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: At least one of `policies` or `profile` is required.
              properties:
                policies:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [type, content, isActive]
                    properties:
                      type:
                        $ref: "#/components/schemas/PolicyDocumentType"
                      content:
                        type: string
                        minLength: 1
                        maxLength: 20000
                      isActive:
                        type: boolean
                profile:
                  $ref: "#/components/schemas/PolicyProfileInput"
      responses:
        "200":
          description: Policy documents updated
          content:
            application/json:
              schema:
                type: object
                required: [updated, requiredTypes, policies, profile]
                properties:
                  updated:
                    type: boolean
                  requiredTypes:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyDocumentType"
                  policies:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyDocument"
                  profile:
                    $ref: "#/components/schemas/PolicyProfile"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden

  /api/cu12/account:
    get:
      tags: [CU12]
      summary: Get CU12 account mapping for effective user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Account payload
          content:
            application/json:
              schema:
                type: object
                required: [account]
                properties:
                  account:
                    allOf:
                      - $ref: "#/components/schemas/Cu12Account"
                    nullable: true
        "401":
          description: Unauthorized
    post:
      tags: [CU12]
      summary: Connect/update CU12 credentials and queue sync
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cu12Id, cu12Password, campus]
              properties:
                cu12Id:
                  type: string
                  minLength: 4
                  maxLength: 80
                cu12Password:
                  type: string
                  minLength: 4
                  maxLength: 120
                campus:
                  $ref: "#/components/schemas/Campus"
      responses:
        "200":
          description: Connected and sync queued
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "409":
          description: Sync is blocked for test users (`TEST_USER_SYNC_BLOCKED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [CU12]
      summary: Alias of POST /api/cu12/account
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Connected and sync queued
        "409":
          description: Sync is blocked for test users (`TEST_USER_SYNC_BLOCKED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/cu12/automation:
    patch:
      tags: [CU12]
      summary: Update CU12 automation flags
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                autoLearnEnabled:
                  type: boolean
                detectActivitiesEnabled:
                  type: boolean
                emailDigestEnabled:
                  type: boolean
      responses:
        "200":
          description: Updated

  /api/cu12/validate-login:
    post:
      tags: [CU12]
      summary: Queue sync job to validate saved CU12 account
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Validation job queued
        "400":
          description: CU12 account is not connected
        "401":
          description: Unauthorized
        "409":
          description: Sync is blocked for test users (`TEST_USER_SYNC_BLOCKED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/jobs/sync-now:
    post:
      tags: [Jobs]
      summary: Queue SYNC job
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Job dispatch status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDispatchResponse"
        "409":
          description: Sync is blocked for test users (`TEST_USER_SYNC_BLOCKED`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/jobs/autolearn-request:
    post:
      tags: [Jobs]
      summary: Queue AUTOLEARN job
      security:
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [SINGLE_NEXT, SINGLE_ALL, ALL_COURSES]
                  default: ALL_COURSES
                lectureSeq:
                  type: integer
                reason:
                  type: string
      responses:
        "200":
          description: Job dispatch status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDispatchResponse"

  /api/jobs:
    get:
      tags: [Jobs]
      summary: List jobs for effective user
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [SYNC, AUTOLEARN, NOTICE_SCAN, MAIL_DIGEST]
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELED]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                type: object
                required: [jobs]
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobItem"

  /api/jobs/{jobId}:
    get:
      tags: [Jobs]
      summary: Get job detail
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetail"
        "404":
          description: Job not found

  /api/jobs/{jobId}/cancel:
    post:
      tags: [Jobs]
      summary: Cancel a pending or running job
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancel result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobCancelResponse"
        "404":
          description: Job not found
        "401":
          description: Unauthorized

  /api/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Dashboard summary counters
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Summary payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /api/dashboard/bootstrap:
    get:
      tags: [Dashboard]
      summary: Aggregated dashboard bootstrap payload
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: deadlinesLimit
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: notificationsLimit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: jobsLimit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Combined dashboard data used by initial page load and refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardBootstrapResponse"
        "401":
          description: Unauthorized

  /api/dashboard/courses:
    get:
      tags: [Dashboard]
      summary: Course snapshot list
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Course list payload
          content:
            application/json:
              schema:
                type: object
                required: [courses]
                properties:
                  courses:
                    type: array
                    items:
                      $ref: "#/components/schemas/DashboardCourse"

  /api/dashboard/diagnostics:
    get:
      tags: [Dashboard]
      summary: Dashboard diagnostics for parser/data quality
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: lectureSeq
          required: false
          schema:
            type: integer
            minimum: 1
        - in: query
          name: sampleLimit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Diagnostics payload
          content:
            application/json:
              schema:
                type: object
                required: [diagnostics]
                properties:
                  diagnostics:
                    $ref: "#/components/schemas/DashboardDiagnostics"
        "400":
          description: Invalid query
        "401":
          description: Unauthorized

  /api/dashboard/deadlines:
    get:
      tags: [Dashboard]
      summary: Upcoming pending task deadlines
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Deadline list
          content:
            application/json:
              schema:
                type: object
                required: [deadlines]
                properties:
                  deadlines:
                    type: array
                    items:
                      $ref: "#/components/schemas/DashboardDeadline"

  /api/dashboard/courses/{lectureSeq}/notices:
    get:
      tags: [Dashboard]
      summary: Notices for one course
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: lectureSeq
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notice list
          content:
            application/json:
              schema:
                type: object
                required: [notices]
                properties:
                  notices:
                    type: array
                    items:
                      $ref: "#/components/schemas/DashboardNotice"

  /api/dashboard/notices/{noticeId}/read:
    patch:
      tags: [Dashboard]
      summary: Mark notice as read
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: noticeId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated

  /api/dashboard/notifications:
    get:
      tags: [Dashboard]
      summary: Notification events for effective user
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: unreadOnly
          schema:
            type: string
            enum: ["1"]
        - in: query
          name: includeArchived
          schema:
            type: string
            enum: ["1"]
        - in: query
          name: historyOnly
          schema:
            type: string
            enum: ["1"]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                type: object
                required: [notifications]
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: "#/components/schemas/DashboardNotification"
    delete:
      tags: [Dashboard]
      summary: Archive selected notifications for effective user
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    type: string
      responses:
        "200":
          description: Deleted notification count
          content:
            application/json:
              schema:
                type: object
                required: [deletedCount]
                properties:
                  deletedCount:
                    type: integer

  /api/dashboard/notifications/{notificationId}/read:
    patch:
      tags: [Dashboard]
      summary: Mark notification as read
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: notificationId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated

  /api/site-notices:
    get:
      tags: [SiteNotice]
      summary: List active site notices (optionally by type)
      parameters:
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum: [BROADCAST, MAINTENANCE]
      responses:
        "200":
          description: Active site notices
          content:
            application/json:
              schema:
                type: object
                required: [siteNotices]
                properties:
                  siteNotices:
                    type: array
                    items:
                      $ref: "#/components/schemas/PublicSiteNotice"
        "400":
          description: Validation error

  /api/admin/site-notices:
    get:
      tags: [SiteNotice]
      summary: List site notices (admin)
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: includeInactive
          schema:
            type: string
            enum: ["1"]
      responses:
        "200":
          description: Site notice list
          content:
            application/json:
              schema:
                type: object
                required: [siteNotices]
                properties:
                  siteNotices:
                    type: array
                    items:
                      $ref: "#/components/schemas/SiteNotice"
        "403":
          description: Forbidden
    post:
      tags: [SiteNotice]
      summary: Create a site notice
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - title
                - isActive
                - priority
              properties:
                type:
                  $ref: "#/components/schemas/SiteNoticeType"
                title:
                  type: string
                  minLength: 1
                  maxLength: 120
                message:
                  type: string
                  maxLength: 3000
                isActive:
                  type: boolean
                priority:
                  type: integer
                  minimum: -999
                  maximum: 999
                visibleFrom:
                  type: string
                  format: date-time
                  nullable: true
                visibleTo:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        "200":
          description: Notice created
          content:
            application/json:
              schema:
                type: object
                required: [created, notice]
                properties:
                  created:
                    type: boolean
                  notice:
                    $ref: "#/components/schemas/SiteNotice"
        "400":
          description: Validation error
        "403":
          description: Forbidden

  /api/admin/site-notices/{noticeId}:
    patch:
      tags: [SiteNotice]
      summary: Update a site notice
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: noticeId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  $ref: "#/components/schemas/SiteNoticeType"
                title:
                  type: string
                  minLength: 1
                  maxLength: 120
                message:
                  type: string
                  maxLength: 3000
                isActive:
                  type: boolean
                priority:
                  type: integer
                  minimum: -999
                  maximum: 999
                visibleFrom:
                  type: string
                  format: date-time
                  nullable: true
                visibleTo:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        "200":
          description: Notice updated
          content:
            application/json:
              schema:
                type: object
                required: [updated, notice]
                properties:
                  updated:
                    type: boolean
                    const: true
                  notice:
                    $ref: "#/components/schemas/SiteNotice"
        "400":
          description: Validation error
        "403":
          description: Forbidden
        "404":
          description: Notice not found
    delete:
      tags: [SiteNotice]
      summary: Delete a site notice
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: noticeId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notice deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean

  /api/admin/jobs:
    get:
      tags: [Admin]
      summary: List job queue entries (admin)
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
          name: type
          schema:
            type: string
            enum: [SYNC, AUTOLEARN, NOTICE_SCAN, MAIL_DIGEST]
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELED]
        - in: query
          name: userId
          schema:
            type: string
      responses:
        "200":
          description: Admin job list
          content:
            application/json:
              schema:
                type: object
                required: [jobs, pagination]
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminJob"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/admin/jobs/{jobId}/cancel:
    post:
      tags: [Admin]
      summary: Cancel a queue job
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminJobCancelResponse"
        "404":
          description: Job not found
        "403":
          description: Forbidden

  /api/admin/jobs/{jobId}/retry:
    post:
      tags: [Admin]
      summary: Retry a queue job
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Job retried
          content:
            application/json:
              schema:
                type: object
                required:
                  - updated
                  - status
                  - jobId
                  - userId
                properties:
                  updated:
                    type: boolean
                  status:
                    type: string
                    enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELED]
                  jobId:
                    type: string
                  userId:
                    type: string
        "404":
          description: Job not found
        "409":
          description: Job cannot be retried (including sync jobs for test users)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden

  /api/admin/jobs/cleanup:
    post:
      tags: [Admin]
      summary: Cleanup historical jobs
      security:
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                olderThanDays:
                  type: integer
                  minimum: 1
                  maximum: 3650
                  default: 30
                statuses:
                  type: array
                  minItems: 1
                  maxItems: 5
                  items:
                    type: string
                    enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELED]
                userId:
                  type: string
                  format: uuid
                scope:
                  type: string
                  enum: [safe, full]
                  default: safe
                dryRun:
                  type: boolean
                  default: false
                confirmCode:
                  type: string
      responses:
        "200":
          description: Job cleanup result
          content:
            application/json:
              schema:
                type: object
                required:
                  - deleted
                  - deletedByStatus
                  - olderThanDays
                  - statusFilter
                  - scope
                  - dryRun
                  - cutoff
                properties:
                  deleted:
                    type: integer
                    minimum: 0
                  deletedByStatus:
                    type: object
                    additionalProperties:
                      type: integer
                      minimum: 0
                    example:
                      PENDING: 0
                      RUNNING: 0
                      SUCCEEDED: 3
                      FAILED: 1
                      CANCELED: 0
                  olderThanDays:
                    type: integer
                    minimum: 1
                  statusFilter:
                    type: array
                    items:
                      type: string
                      enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELED]
                  scope:
                    type: string
                    enum: [safe, full]
                  dryRun:
                    type: boolean
                  cutoff:
                    type: string
                    format: date-time
        "400":
          description: Validation error
        "403":
          description: Forbidden

  /api/admin/jobs/reconcile:
    get:
      tags: [Admin]
      summary: Reconcile dashboard RUNNING jobs with active GitHub Action runs
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Reconciliation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminJobReconcileResponse"
        "500":
          description: Reconciliation failed

  /internal/admin/jobs/reconcile:
    get:
      tags: [Admin]
      summary: Reconcile dashboard RUNNING jobs with active GitHub Action runs (internal)
      description: Internal endpoint for automated health checks running without browser session cookies.
      security:
        - workerToken: []
      responses:
        "200":
          description: Reconciliation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminJobReconcileResponse"
        "403":
          description: Forbidden
        "500":
          description: Reconciliation failed

  /api/admin/workers:
    get:
      tags: [Admin]
      summary: List worker heartbeats and summaries
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: staleMinutes
          schema:
            type: integer
            minimum: 1
            maximum: 120
            default: 10
      responses:
        "200":
          description: Worker heartbeat list
          content:
            application/json:
              schema:
                type: object
                required: [workers, summary]
                properties:
                  workers:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkerHeartbeat"
                  summary:
                    type: object
                    required:
                      - total
                      - active
                      - stale
                      - staleMinutes
                      - capturedAt
                      - staleCutoff
                    properties:
                      total:
                        type: integer
                        minimum: 0
                      active:
                        type: integer
                        minimum: 0
                      stale:
                        type: integer
                        minimum: 0
                      staleMinutes:
                        type: integer
                        minimum: 1
                      capturedAt:
                        type: string
                        format: date-time
                      staleCutoff:
                        type: string
                        format: date-time

        "403":
          description: Forbidden
        "400":
          description: Invalid request
    delete:
      tags: [Admin]
      summary: Purge all worker heartbeats
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Worker heartbeats purged
          content:
            application/json:
              schema:
                type: object
                required: [deleted, clearedAt]
                properties:
                  deleted:
                    type: integer
                    minimum: 0
                  clearedAt:
                    type: string
                    format: date-time
        "403":
          description: Forbidden

  /api/mail/preferences:
    get:
      tags: [Mail]
      summary: Get mail preferences
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Mail preference payload
          content:
            application/json:
              schema:
                type: object
                required: [preference]
                properties:
                  preference:
                    $ref: "#/components/schemas/MailPreference"
    patch:
      tags: [Mail]
      summary: Update mail preferences
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                enabled:
                  type: boolean
                alertOnNotice:
                  type: boolean
                alertOnDeadline:
                  type: boolean
                alertOnAutolearn:
                  type: boolean
                digestEnabled:
                  type: boolean
                digestHour:
                  type: integer
                  minimum: 0
                  maximum: 23
      responses:
        "200":
          description: Updated

  /api/admin/impersonation:
    post:
      tags: [Admin]
      summary: Start impersonation as target user
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId:
                  type: string
      responses:
        "200":
          description: Impersonation started
        "403":
          description: Forbidden
    delete:
      tags: [Admin]
      summary: End impersonation
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Impersonation ended

  /api/admin/members:
    get:
      tags: [Admin]
      summary: List members (admin only)
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Member list
    post:
      tags: [Admin]
      summary: Create or update a member from CU12 credentials or local credentials
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cu12Id]
              properties:
                cu12Id:
                  type: string
                  minLength: 4
                  maxLength: 80
                isActive:
                  type: boolean
                  default: true
                cu12Password:
                  type: string
                  minLength: 4
                  maxLength: 120
                localPassword:
                  type: string
                  minLength: 8
                  maxLength: 120
                campus:
                  $ref: "#/components/schemas/Campus"
                role:
                  $ref: "#/components/schemas/UserRole"
                isTestUser:
                  type: boolean
                name:
                  type: string
      responses:
        "200":
          description: Member created/updated
        "401":
          description: CU12 credential verification failed

  /api/admin/members/{userId}:
    patch:
      tags: [Admin]
      summary: Update member flags/profile
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  $ref: "#/components/schemas/UserRole"
                isTestUser:
                  type: boolean
                isActive:
                  type: boolean
                name:
                  type: string
                localPassword:
                  type: string
                  minLength: 8
                  maxLength: 120
                autoLearnEnabled:
                  type: boolean
                detectActivitiesEnabled:
                  type: boolean
                emailDigestEnabled:
                  type: boolean
                accountStatus:
                  type: string
                  enum: [CONNECTED, NEEDS_REAUTH, ERROR]
                statusReason:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Member updated
    delete:
      tags: [Admin]
      summary: Delete member account
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
      responses:
        "200":
          description: Member deleted

  /api/admin/members/{userId}/sync:
    post:
      tags: [Admin]
      summary: Queue immediate sync job for a member
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                runAfter:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        "200":
          description: Sync requested
          content:
            application/json:
              schema:
                type: object
                required:
                  - jobId
                  - status
                  - deduplicated
                  - dispatched
                  - notice
                properties:
                  jobId:
                    type: string
                  status:
                    type: string
                    enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELED]
                  deduplicated:
                    type: boolean
                  dispatched:
                    type: boolean
                  dispatchError:
                    type: string
                    nullable: true
                  notice:
                    type: string
        "404":
          description: Member not found
        "403":
          description: Forbidden
        "409":
          description: Member has no CU12 account, is inactive, or sync is blocked for test users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/logs:
    get:
      tags: [Admin]
      summary: List audit logs
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: category
          schema:
            type: string
            enum:
              [AUTH, ADMIN, JOB, WORKER, MAIL, PARSER, SECURITY, IMPERSONATION]
        - in: query
          name: severity
          schema:
            type: string
            enum: [INFO, WARN, ERROR]
        - in: query
          name: targetUserId
          schema:
            type: string
        - in: query
          name: actorUserId
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        responses:
        "200":
          description: Audit log list
          content:
            application/json:
              schema:
                type: object
                required: [logs, pagination]
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                      required: [id, category, severity, message, createdAt]
                      properties:
                        id:
                          type: string
                        category:
                          type: string
                          enum: [AUTH, ADMIN, JOB, WORKER, MAIL, PARSER, SECURITY, IMPERSONATION]
                        severity:
                          type: string
                          enum: [INFO, WARN, ERROR]
                        message:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                        actor:
                          type: object
                          nullable: true
                          properties:
                            email:
                              type: string
                              format: email
                        target:
                          type: object
                          nullable: true
                          properties:
                            email:
                              type: string
                              format: email
                  pagination:
                    type: object
                    required: [page, limit, total, totalPages, hasNextPage, hasPrevPage]
                    properties:
                      page:
                        type: integer
                        minimum: 1
                      limit:
                        type: integer
                        minimum: 1
                        maximum: 500
                      total:
                        type: integer
                        minimum: 0
                      totalPages:
                        type: integer
                        minimum: 1
                      hasNextPage:
                        type: boolean
                      hasPrevPage:
                        type: boolean
    delete:
      tags: [Admin]
      summary: Purge audit logs and keep one audit trail entry
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Audit logs purged
          content:
            application/json:
              schema:
                type: object
                required: [deleted, retained, retainedLogId]
                properties:
                  deleted:
                    type: integer
                    minimum: 0
                  retained:
                    type: integer
                    minimum: 1
                  retainedLogId:
                    type: string
        "403":
          description: Forbidden

  /api/admin/members/{userId}/mail-test:
    post:
      tags: [Admin]
      summary: Send a mail test message to a member
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                to:
                  type: string
                  format: email
                subject:
                  type: string
                  maxLength: 120
                message:
                  type: string
                  maxLength: 3000
      responses:
        "200":
          description: Mail test sent
          content:
            application/json:
              schema:
                type: object
                required: [sent, to, reason]
                properties:
                  sent:
                    type: boolean
                  to:
                    type: string
                    format: email
                  reason:
                    type: string
                    nullable: true
        "400":
          description: SMTP not configured or send failed
        "403":
          description: Forbidden
        "404":
          description: User not found
        "409":
          description: Cannot send to inactive member

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: cu12_session
    workerToken:
      type: apiKey
      in: header
      name: x-worker-token

  schemas:
    UserRole:
      type: string
      enum: [ADMIN, USER]

    PolicyDocumentType:
      type: string
      enum: [PRIVACY_POLICY, TERMS_OF_SERVICE]

    Campus:
      type: string
      enum: [SONGSIM, SONGSIN]
      default: SONGSIM

    SessionUser:
      type: object
      required: [userId, email, role]
      properties:
        userId:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"

    SessionContext:
      type: object
      required: [actor, effective, impersonating]
      properties:
        actor:
          $ref: "#/components/schemas/SessionUser"
        effective:
          $ref: "#/components/schemas/SessionUser"
        impersonating:
          type: boolean

    SessionPolicy:
      type: object
      required: [rememberSession, sessionMaxAgeSeconds, idleMaxAgeSeconds]
      properties:
        rememberSession:
          type: boolean
        sessionMaxAgeSeconds:
          type: integer
        idleMaxAgeSeconds:
          type: integer

    LoginAuthenticated:
      type: object
      required: [stage, user, firstLogin, session]
      properties:
        stage:
          type: string
          enum: [AUTHENTICATED]
        user:
          type: object
          required: [userId, cu12Id, role]
          properties:
            userId:
              type: string
            cu12Id:
              type: string
            role:
              $ref: "#/components/schemas/UserRole"
        firstLogin:
          type: boolean
        session:
          $ref: "#/components/schemas/SessionPolicy"

    LoginInviteRequired:
      type: object
      required: [stage, challengeToken]
      properties:
        stage:
          type: string
          enum: [INVITE_REQUIRED]
        challengeToken:
          type: string

    LoginConsentRequired:
      type: object
      required: [stage, consentToken, policies, user, firstLogin, session]
      properties:
        stage:
          type: string
          enum: [CONSENT_REQUIRED]
        consentToken:
          type: string
        policies:
          type: array
          items:
            $ref: "#/components/schemas/PolicyDocument"
        user:
          type: object
          required: [userId, cu12Id, role]
          properties:
            userId:
              type: string
            cu12Id:
              type: string
            role:
              $ref: "#/components/schemas/UserRole"
        firstLogin:
          type: boolean
        session:
          $ref: "#/components/schemas/SessionPolicy"

    PolicyDocument:
      type: object
      required: [type, title, version, content, isActive, createdAt, updatedAt]
      properties:
        type:
          $ref: "#/components/schemas/PolicyDocumentType"
        title:
          type: string
        version:
          type: integer
          minimum: 1
        content:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PolicyProfileInput:
      type: object
      properties:
        companyName:
          type: string
          nullable: true
        supportEmail:
          type: string
          nullable: true
        companyAddress:
          type: string
          nullable: true
        dpoName:
          type: string
          nullable: true
        dpoTitle:
          type: string
          nullable: true
        dpoEmail:
          type: string
          nullable: true
        dpoPhone:
          type: string
          nullable: true
        jurisdictionCourt:
          type: string
          nullable: true
        effectiveDate:
          type: string
          nullable: true
        revisionDate:
          type: string
          nullable: true

    PolicyProfile:
      allOf:
        - $ref: "#/components/schemas/PolicyProfileInput"
        - type: object
          required:
            [
              companyName,
              supportEmail,
              companyAddress,
              dpoName,
              dpoTitle,
              dpoEmail,
              dpoPhone,
              jurisdictionCourt,
              effectiveDate,
              revisionDate,
              createdAt,
              updatedAt,
            ]
          properties:
            createdAt:
              type: string
              format: date-time
              nullable: true
            updatedAt:
              type: string
              format: date-time
              nullable: true

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        errorCode:
          type: string

    Pagination:
      type: object
      required: [page, limit, total, totalPages, hasNextPage, hasPrevPage]
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 1
        hasNextPage:
          type: boolean
        hasPrevPage:
          type: boolean

    InviteToken:
      type: object
      required: [id, cu12Id, role, createdAt, expiresAt, state]
      properties:
        id:
          type: string
        cu12Id:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        usedAt:
          type: string
          format: date-time
          nullable: true
        usedByEmail:
          type: string
          nullable: true
        state:
          type: string
          enum: [ACTIVE, INACTIVE, USED, EXPIRED]
        isActive:
          type: boolean

    Cu12Account:
      type: object
      required:
        [
          cu12Id,
          campus,
          accountStatus,
          autoLearnEnabled,
          detectActivitiesEnabled,
          emailDigestEnabled,
          updatedAt,
        ]
      properties:
        cu12Id:
          type: string
        campus:
          $ref: "#/components/schemas/Campus"
        accountStatus:
          type: string
          enum: [CONNECTED, NEEDS_REAUTH, ERROR]
        statusReason:
          type: string
          nullable: true
        autoLearnEnabled:
          type: boolean
        detectActivitiesEnabled:
          type: boolean
        emailDigestEnabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time

    MailPreference:
      type: object
      required:
        [
          email,
          enabled,
          alertOnNotice,
          alertOnDeadline,
