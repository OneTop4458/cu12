openapi: 3.1.0
info:
  title: CU12 Automation API
  version: 0.5.0
  description: >-
    API contract for the CU12 Automation web application.
    This document reflects the runtime behavior implemented in apps/web as of 2026-03-03.
servers:
  - url: https://your-app.example.com

tags:
  - name: Health
  - name: Session
  - name: Auth
  - name: CU12
  - name: Jobs
  - name: Dashboard
  - name: Mail
  - name: Admin

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /api/session/context:
    get:
      tags: [Session]
      summary: Get actor/effective session context
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Session context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionContext"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/me:
    get:
      tags: [Session]
      summary: Get actor/effective user profile
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User profile payload
        "401":
          description: Unauthorized
        "404":
          description: User not found

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Step 1 login with CU12 credentials
      description: >-
        Verifies CU12 credentials in real time.
        Returns AUTHENTICATED for mapped users, or INVITE_REQUIRED with a short-lived challenge token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cu12Id, cu12Password]
              properties:
                cu12Id:
                  type: string
                  minLength: 4
                  maxLength: 80
                cu12Password:
                  type: string
                  minLength: 4
                  maxLength: 120
                campus:
                  $ref: "#/components/schemas/Campus"
      responses:
        "200":
          description: Authenticated or invite required
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginAuthenticated"
                  - $ref: "#/components/schemas/LoginInviteRequired"
        "401":
          description: CU12 credential verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/login/invite:
    post:
      tags: [Auth]
      summary: Step 2 invite verification (first login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challengeToken, inviteCode]
              properties:
                challengeToken:
                  type: string
                  minLength: 20
                inviteCode:
                  type: string
                  minLength: 8
                  maxLength: 200
      responses:
        "200":
          description: Authenticated after invite verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginAuthenticated"
        "401":
          description: Challenge token invalid/expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Invite invalid/expired or CU12 ID not approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and clear session/idle/impersonation cookies
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logged out

  /api/auth/session/refresh:
    post:
      tags: [Session]
      summary: Refresh idle session window
      description: >-
        Extends the idle session cookie (`cu12_idle`) when current auth cookies are valid.
        Keeps absolute session expiry unchanged.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Idle window refreshed
          content:
            application/json:
              schema:
                type: object
                required: [ok, expiresInSeconds]
                properties:
                  ok:
                    type: boolean
                  expiresInSeconds:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/invite:
    get:
      tags: [Admin]
      summary: List invite tokens (admin only)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Invite list
          content:
            application/json:
              schema:
                type: object
                required: [invites]
                properties:
                  invites:
                    type: array
                    items:
                      $ref: "#/components/schemas/InviteToken"
        "403":
          description: Forbidden
    post:
      tags: [Admin]
      summary: Create invite token (admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cu12Id]
              properties:
                cu12Id:
                  type: string
                  minLength: 4
                  maxLength: 80
                role:
                  $ref: "#/components/schemas/UserRole"
                expiresHours:
                  type: integer
                  minimum: 1
                  maximum: 720
                  default: 72
                isActive:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Invite token created
        "403":
          description: Forbidden
    patch:
      tags: [Admin]
      summary: Activate/deactivate invite token
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inviteId, isActive]
              properties:
                inviteId:
                  type: string
                isActive:
                  type: boolean
      responses:
        "200":
          description: Invite token updated
        "403":
          description: Forbidden

  /api/cu12/account:
    get:
      tags: [CU12]
      summary: Get CU12 account mapping for effective user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Account payload
          content:
            application/json:
              schema:
                type: object
                required: [account]
                properties:
                  account:
                    allOf:
                      - $ref: "#/components/schemas/Cu12Account"
                    nullable: true
        "401":
          description: Unauthorized
    post:
      tags: [CU12]
      summary: Connect/update CU12 credentials and queue sync
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cu12Id, cu12Password, campus]
              properties:
                cu12Id:
                  type: string
                  minLength: 4
                  maxLength: 80
                cu12Password:
                  type: string
                  minLength: 4
                  maxLength: 120
                campus:
                  $ref: "#/components/schemas/Campus"
      responses:
        "200":
          description: Connected and sync queued
        "400":
          description: Validation error
        "401":
          description: Unauthorized
    patch:
      tags: [CU12]
      summary: Alias of POST /api/cu12/account
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Connected and sync queued

  /api/cu12/automation:
    patch:
      tags: [CU12]
      summary: Update CU12 automation flags
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                autoLearnEnabled:
                  type: boolean
                detectActivitiesEnabled:
                  type: boolean
                emailDigestEnabled:
                  type: boolean
      responses:
        "200":
          description: Updated

  /api/cu12/validate-login:
    post:
      tags: [CU12]
      summary: Queue sync job to validate saved CU12 account
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Validation job queued
        "400":
          description: CU12 account is not connected
        "401":
          description: Unauthorized

  /api/jobs/sync-now:
    post:
      tags: [Jobs]
      summary: Queue SYNC job
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Job dispatch status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDispatchResponse"

  /api/jobs/autolearn-request:
    post:
      tags: [Jobs]
      summary: Queue AUTOLEARN job
      security:
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [SINGLE_NEXT, SINGLE_ALL, ALL_COURSES]
                  default: ALL_COURSES
                lectureSeq:
                  type: integer
                reason:
                  type: string
      responses:
        "200":
          description: Job dispatch status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDispatchResponse"

  /api/jobs:
    get:
      tags: [Jobs]
      summary: List jobs for effective user
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [SYNC, AUTOLEARN, NOTICE_SCAN, MAIL_DIGEST]
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELED]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                type: object
                required: [jobs]
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobItem"

  /api/jobs/{jobId}:
    get:
      tags: [Jobs]
      summary: Get job detail
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetail"
        "404":
          description: Job not found

  /api/jobs/{jobId}/cancel:
    post:
      tags: [Jobs]
      summary: Cancel a pending or running job
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancel result
          content:
            application/json:
              schema:
                type: object
                required:
                  - updated
                  - status
                properties:
                  updated:
                    type: boolean
                  status:
                    type: string
                    enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELED]
        "404":
          description: Job not found
        "401":
          description: Unauthorized

  /api/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Dashboard summary counters
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Summary payload

  /api/dashboard/bootstrap:
    get:
      tags: [Dashboard]
      summary: Aggregated dashboard bootstrap payload
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: deadlinesLimit
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: notificationsLimit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: jobsLimit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Combined dashboard data used by initial page load and refresh
        "401":
          description: Unauthorized

  /api/dashboard/courses:
    get:
      tags: [Dashboard]
      summary: Course snapshot list
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Course list payload

  /api/dashboard/deadlines:
    get:
      tags: [Dashboard]
      summary: Upcoming pending task deadlines
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Deadline list

  /api/dashboard/courses/{lectureSeq}/notices:
    get:
      tags: [Dashboard]
      summary: Notices for one course
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: lectureSeq
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notice list

  /api/dashboard/notices/{noticeId}/read:
    patch:
      tags: [Dashboard]
      summary: Mark notice as read
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: noticeId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated

  /api/dashboard/notifications:
    get:
      tags: [Dashboard]
      summary: Notification events for effective user
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: unreadOnly
          schema:
            type: string
            enum: ["1"]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Notification list

  /api/dashboard/notifications/{notificationId}/read:
    patch:
      tags: [Dashboard]
      summary: Mark notification as read
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: notificationId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated

  /api/mail/preferences:
    get:
      tags: [Mail]
      summary: Get mail preferences
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Mail preference payload
          content:
            application/json:
              schema:
                type: object
                required: [preference]
                properties:
                  preference:
                    $ref: "#/components/schemas/MailPreference"
    patch:
      tags: [Mail]
      summary: Update mail preferences
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                enabled:
                  type: boolean
                alertOnNotice:
                  type: boolean
                alertOnDeadline:
                  type: boolean
                alertOnAutolearn:
                  type: boolean
                digestEnabled:
                  type: boolean
                digestHour:
                  type: integer
                  minimum: 0
                  maximum: 23
      responses:
        "200":
          description: Updated

  /api/admin/impersonation:
    post:
      tags: [Admin]
      summary: Start impersonation as target user
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId:
                  type: string
      responses:
        "200":
          description: Impersonation started
        "403":
          description: Forbidden
    delete:
      tags: [Admin]
      summary: End impersonation
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Impersonation ended

  /api/admin/members:
    get:
      tags: [Admin]
      summary: List members (admin only)
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Member list
    post:
      tags: [Admin]
      summary: Create or update a member from CU12 credentials or local credentials
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cu12Id]
              properties:
                cu12Id:
                  type: string
                  minLength: 4
                  maxLength: 80
                isActive:
                  type: boolean
                  default: true
                cu12Password:
                  type: string
                  minLength: 4
                  maxLength: 120
                localPassword:
                  type: string
                  minLength: 8
                  maxLength: 120
                campus:
                  $ref: "#/components/schemas/Campus"
                role:
                  $ref: "#/components/schemas/UserRole"
                isTestUser:
                  type: boolean
                name:
                  type: string
      responses:
        "200":
          description: Member created/updated
        "401":
          description: CU12 credential verification failed

  /api/admin/members/{userId}:
    patch:
      tags: [Admin]
      summary: Update member flags/profile
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  $ref: "#/components/schemas/UserRole"
                isTestUser:
                  type: boolean
                isActive:
                  type: boolean
                name:
                  type: string
                localPassword:
                  type: string
                  minLength: 8
                  maxLength: 120
                autoLearnEnabled:
                  type: boolean
                detectActivitiesEnabled:
                  type: boolean
                emailDigestEnabled:
                  type: boolean
                accountStatus:
                  type: string
                  enum: [CONNECTED, NEEDS_REAUTH, ERROR]
                statusReason:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Member updated
    delete:
      tags: [Admin]
      summary: Deactivate member account
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
      responses:
        "200":
          description: Member deactivated

  /api/admin/logs:
    get:
      tags: [Admin]
      summary: List audit logs
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - in: query
          name: category
          schema:
            type: string
            enum:
              [AUTH, ADMIN, JOB, WORKER, MAIL, PARSER, SECURITY, IMPERSONATION]
        - in: query
          name: severity
          schema:
            type: string
            enum: [INFO, WARN, ERROR]
        - in: query
          name: targetUserId
          schema:
            type: string
      responses:
        "200":
          description: Audit log list

  /api/admin/members/{userId}/mail-test:
    post:
      tags: [Admin]
      summary: Send a mail test message to a member
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                to:
                  type: string
                  format: email
                subject:
                  type: string
                  maxLength: 120
                message:
                  type: string
                  maxLength: 3000
      responses:
        "200":
          description: Mail test sent
          content:
            application/json:
              schema:
                type: object
                required: [sent, to, reason]
                properties:
                  sent:
                    type: boolean
                  to:
                    type: string
                    format: email
                  reason:
                    type: string
                    nullable: true
        "400":
          description: SMTP not configured or send failed
        "403":
          description: Forbidden
        "404":
          description: User not found
        "409":
          description: Cannot send to inactive member

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: cu12_session

  schemas:
    UserRole:
      type: string
      enum: [ADMIN, USER]

    Campus:
      type: string
      enum: [SONGSIM, SONGSIN]
      default: SONGSIM

    SessionUser:
      type: object
      required: [userId, email, role]
      properties:
        userId:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"

    SessionContext:
      type: object
      required: [actor, effective, impersonating]
      properties:
        actor:
          $ref: "#/components/schemas/SessionUser"
        effective:
          $ref: "#/components/schemas/SessionUser"
        impersonating:
          type: boolean

    LoginAuthenticated:
      type: object
      required: [stage, user, firstLogin]
      properties:
        stage:
          type: string
          enum: [AUTHENTICATED]
        user:
          type: object
          required: [userId, cu12Id, role]
          properties:
            userId:
              type: string
            cu12Id:
              type: string
            role:
              $ref: "#/components/schemas/UserRole"
        firstLogin:
          type: boolean

    LoginInviteRequired:
      type: object
      required: [stage, challengeToken]
      properties:
        stage:
          type: string
          enum: [INVITE_REQUIRED]
        challengeToken:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        errorCode:
          type: string

    InviteToken:
      type: object
      required: [id, cu12Id, role, createdAt, expiresAt, state]
      properties:
        id:
          type: string
        cu12Id:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        usedAt:
          type: string
          format: date-time
          nullable: true
        usedByEmail:
          type: string
          nullable: true
        state:
          type: string
          enum: [ACTIVE, INACTIVE, USED, EXPIRED]
        isActive:
          type: boolean

    Cu12Account:
      type: object
      required:
        [
          cu12Id,
          campus,
          accountStatus,
          autoLearnEnabled,
          detectActivitiesEnabled,
          emailDigestEnabled,
          updatedAt,
        ]
      properties:
        cu12Id:
          type: string
        campus:
          $ref: "#/components/schemas/Campus"
        accountStatus:
          type: string
          enum: [CONNECTED, NEEDS_REAUTH, ERROR]
        statusReason:
          type: string
          nullable: true
        autoLearnEnabled:
          type: boolean
        detectActivitiesEnabled:
          type: boolean
        emailDigestEnabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time

    MailPreference:
      type: object
      required:
        [
          email,
          enabled,
          alertOnNotice,
          alertOnDeadline,
          alertOnAutolearn,
          digestEnabled,
          digestHour,
        ]
      properties:
        email:
          type: string
          format: email
        enabled:
          type: boolean
        alertOnNotice:
          type: boolean
        alertOnDeadline:
          type: boolean
        alertOnAutolearn:
          type: boolean
        digestEnabled:
          type: boolean
        digestHour:
          type: integer
          minimum: 0
          maximum: 23
        updatedAt:
          type: string
          format: date-time
          nullable: true

    JobDispatchResponse:
      type: object
      required: [jobId, status, deduplicated, dispatched, notice]
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELED]
        deduplicated:
          type: boolean
        dispatched:
          type: boolean
        dispatchError:
          type: string
          nullable: true
        notice:
          type: string

    JobItem:
      type: object
      required:
        [
          id,
          userId,
          type,
          status,
          attempts,
          maxAttempts,
          runAfter,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          type: string
          enum: [SYNC, AUTOLEARN, NOTICE_SCAN, MAIL_DIGEST]
        status:
          type: string
          enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELED]
        payload:
          type: object
          nullable: true
        result:
          type: object
          nullable: true
        attempts:
          type: integer
        maxAttempts:
          type: integer
        runAfter:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        lastError:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
